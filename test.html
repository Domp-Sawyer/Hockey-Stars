<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hockey Stars 2.0</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #0b1c3c; color: #fff; overflow: hidden; touch-action: none; }
.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; z-index: 10; overflow-y: auto; }
.active { display: flex; }
.btn { background: #f5d300; color: #000; border: 4px solid #000; border-radius: 12px; padding: 15px 30px; font-size: 20px; cursor: pointer; box-shadow: 0 5px 0 #000; transform: skewX(-5deg); text-transform: uppercase; }
.btn:active { transform: skewX(-5deg) translateY(3px); box-shadow: 0 2px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }
.input-field { padding: 15px; font-size: 18px; border: 4px solid #000; border-radius: 10px; width: 80%; max-width: 300px; margin-bottom: 15px; background: #fff; color: #000; outline: none; }
.emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; }
.emoji-item { font-size: 30px; cursor: pointer; padding: 10px; border-radius: 10px; border: 2px solid transparent; text-align: center; }
.emoji-item.sel { border-color: #00ff00; background: rgba(0,255,0,0.2); }
.top-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px; z-index: 50; position: absolute; top: 0; }
.profile-box { background: rgba(0,0,0,0.7); border: 3px solid #000; border-radius: 10px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; }
.lobby-center { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; position: relative; }
.char-selector { display: flex; align-items: center; gap: 30px; }
.arr { font-size: 50px; cursor: pointer; color: #f5d300; text-shadow: 2px 2px 0 #000; }
.char-display { text-align: center; }
.char-img { font-size: 120px; filter: drop-shadow(0 10px 0 rgba(0,0,0,0.5)); margin: 10px 0; }
.char-info { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; border: 2px solid #fff; min-width: 200px; }
.bottom-bar { position: absolute; bottom: 20px; display: flex; gap: 20px; }
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }
.score-board { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 3px solid #fff; padding: 5px 20px; border-radius: 10px; font-size: 30px; pointer-events: auto; }
.goal-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: #ffeb3b; text-shadow: 0 5px 15px #000; display: none; }
.pins { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
.pin-btn { font-size: 35px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
.lb-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 10px; margin-bottom: 5px; border-radius: 8px; border: 1px solid #fff; width: 90%; max-width: 400px; }
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:200; flex-direction:column; }
#loading-scr { display:flex; justify-content:center; align-items:center; position:absolute; width:100%; height:100%; background:#0b1c3c; z-index:1000; color:#fff; font-size:24px; }
canvas { width: 100vw; height: 100vh; object-fit: contain; display: block; }
</style>
</head>
<body>
<div id="loading-scr">ЗАГРУЗКА...</div>
<div id="scr-auth" class="screen">
    <h1 style="margin-top: 50px; font-size: 40px; color: #f5d300;">РЕГИСТРАЦИЯ</h1>
    <input type="text" id="reg-user" class="input-field" placeholder="Username (login)">
    <input type="text" id="reg-nick" class="input-field" placeholder="Никнейм в игре">
    <h3>Выбери аватарку</h3>
    <div class="emoji-grid" id="reg-av-grid"></div>
    <div class="btn" onclick="saveAuth()">ВОЙТИ В ИГРУ</div>
</div>
<div id="scr-lobby" class="screen">
    <div class="top-bar">
        <div class="profile-box">
            <span id="lb-av" style="font-size: 30px;"></span>
            <div style="display:flex; flex-direction:column;">
                <span id="lb-nick" style="font-size: 16px;"></span>
                <span style="font-size: 12px; color: #aaa;" id="lb-user"></span>
            </div>
        </div>
        <div class="profile-box" style="color:#ff9000;">🏆 <span id="lb-tot-cups"></span></div>
    </div>
    <div class="lobby-center">
        <div class="char-selector">
            <div class="arr" onclick="changeChar(-1)">◄</div>
            <div class="char-display">
                <div style="font-size: 20px; color: #ff9000;">🏆 <span id="ch-cups">0</span></div>
                <div id="ch-img" class="char-img">💩</div>
                <h2 id="ch-name" style="margin: 0;">Пуп</h2>
                <div class="char-info">
                    Размер: <span id="ch-s"></span><br>
                    Сила: <span id="ch-p"></span><br>
                    <span id="ch-t" style="color:#00ff88; font-size:14px;"></span>
                </div>
            </div>
            <div class="arr" onclick="changeChar(1)">►</div>
        </div>
    </div>
    <div style="position: absolute; right: 20px; top: 100px;">
        <div class="btn btn-blue" style="padding: 10px; font-size: 14px;" onclick="showLeaderboard()">ТОП ИГРОКОВ</div>
        <div style="margin-top:15px; font-size:12px; text-align:right;">ОНЛАЙН: <span id="real-online">0</span></div>
    </div>
    <div class="bottom-bar">
        <div class="btn" onclick="findMatch(1)">1 VS 1</div>
        <div class="btn btn-red" onclick="findMatch(2)">2 VS 2</div>
    </div>
</div>
<div id="scr-lb" class="screen">
    <h1 style="margin-top:20px; color:#f5d300;">ГЛОБАЛЬНЫЙ ТОП</h1>
    <div id="lb-list" style="width:100%; display:flex; flex-direction:column; align-items:center; overflow-y:auto; flex:1; padding-bottom:20px;"></div>
    <div class="btn btn-red" style="margin: 20px;" onclick="switchScr('scr-lobby')">НАЗАД</div>
</div>
<div id="scr-game" class="screen" style="background:#2e86de;">
    <canvas id="cvs"></canvas>
    <div id="game-ui">
        <div class="score-board"><span id="sc1">0</span> : <span id="sc2">0</span></div>
        <div class="goal-text" id="txt-goal">ГОЛ!</div>
        <div class="pins">
            <div class="pin-btn" onclick="sendPin('😄')">😄</div>
            <div class="pin-btn" onclick="sendPin('👍')">👍</div>
            <div class="pin-btn" onclick="sendPin('👎')">👎</div>
            <div class="pin-btn" onclick="sendPin('🤡')">🤡</div>
        </div>
    </div>
</div>
<div id="mod-match" class="modal-overlay">
    <h1 style="color:#f5d300; font-size:40px;">ПОИСК ИГРОКОВ...</h1>
    <h2 id="mm-timer">3</h2>
</div>
<div id="mod-res" class="modal-overlay">
    <h1 id="res-title" style="font-size:50px;"></h1>
    <h2 id="res-cups" style="font-size:40px; color:#ff9000;"></h2>
    <div class="btn" style="margin-top:30px;" onclick="exitMatch()">В ЛОББИ</div>
</div>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    storageBucket: "threecats-hockey.firebasestorage.app",
    messagingSenderId: "859200036415",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const CHARS = [
    {id:'c1', n:'💩 Пуп', e:'💩', s:25, p:6, t:'Обычный'},
    {id:'c2', n:'😋 Ям', e:'😋', s:35, p:4, t:'Тяжелый'},
    {id:'c3', n:'⚡ Лайт', e:'⚡', s:20, p:9, t:'Быстрый'},
    {id:'c4', n:'👻 Гэст', e:'👻', s:28, p:7, t:'Скользкий'},
    {id:'c5', n:'🔥 Файер', e:'🔥', s:32, p:6, t:'Сильный удар'},
    {id:'c6', n:'🐝 Базз', e:'🐝', s:18, p:8, t:'Маленький'},
    {id:'c7', n:'👾 Пикз', e:'👾', s:33, p:5, t:'Широкий'},
    {id:'c8', n:'💀 Скул', e:'💀', s:30, p:6, t:'Агрессивный'},
    {id:'c9', n:'🤡 Клайни', e:'🤡', s:35, p:5, t:'Непредсказуемый'},
    {id:'c10', n:'🧟 Замб', e:'🧟', s:40, p:3, t:'Танк'}
];
const EMOJIS = ['😺','😎','👽','🤖','👻','💀','🤡','💩','🐵','🦊'];
let user, uData, selIdx = 0, selAv = '😺';
let inGame = false, mType = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1000, ch = 600;
let dragState = { active: false, px: 0, py: 0 };
let keys = {};

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function getEventPos(e) {
    let rect = cvs.getBoundingClientRect();
    let scaleX = cw / rect.width;
    let scaleY = ch / rect.height;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

window.addEventListener('pointerdown', e => {
    if(!inGame) return;
    let pos = getEventPos(e);
    let me = pList.find(p => p.isMe);
    if(me) {
        let dist = Math.hypot(me.x - pos.x, me.y - pos.y);
        if(dist <= me.r * 2) dragState.active = true;
    }
});
window.addEventListener('pointermove', e => {
    if(!dragState.active || !inGame) return;
    let pos = getEventPos(e);
    let me = pList.find(p => p.isMe);
    if(me) {
        me.x = pos.x;
        me.y = pos.y;
    }
});
window.addEventListener('pointerup', () => dragState.active = false);
window.addEventListener('pointercancel', () => dragState.active = false);

function switchScr(id) {
    document.getElementById('loading-scr').style.display = 'none';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function initReg() {
    let grid = document.getElementById('reg-av-grid');
    grid.innerHTML = '';
    EMOJIS.forEach(e => {
        let d = document.createElement('div');
        d.className = 'emoji-item' + (e===selAv?' sel':'');
        d.innerText = e;
        d.onclick = () => { selAv=e; initReg(); };
        grid.appendChild(d);
    });
}
function saveAuth() {
    let u = document.getElementById('reg-user').value.trim();
    let n = document.getElementById('reg-nick').value.trim();
    if(!u || !n) return;
    uData = { user:u, nick:n, av:selAv, wins:0, cups:{} };
    CHARS.forEach(c => uData.cups[c.id] = 0);
    db.ref('users/'+user.uid).set(uData).then(() => renderLobby());
}

let myConnRef;
auth.onAuthStateChanged(u => {
    if(u) {
        user = u;
        myConnRef = db.ref('online/' + user.uid);
        db.ref('.info/connected').on('value', s => {
            if(s.val() === true) {
                myConnRef.set(true);
                myConnRef.onDisconnect().remove();
            }
        });
        db.ref('online').on('value', s => {
            document.getElementById('real-online').innerText = s.numChildren();
        });
        db.ref('users/'+u.uid).once('value').then(s => {
            if(s.exists()) { 
                uData = s.val(); 
                if(!uData.cups) uData.cups = {};
                if(typeof uData.wins === 'undefined') uData.wins = 0;
                db.ref('users/'+user.uid).update(uData);
                renderLobby(); 
            } else { initReg(); switchScr('scr-auth'); }
        }).catch(() => { initReg(); switchScr('scr-auth'); });
    } else { auth.signInAnonymously(); }
});

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    document.getElementById('lb-user').innerText = '@'+uData.user;
    let tot = 0; CHARS.forEach(c => tot += (uData.cups[c.id] || 0));
    document.getElementById('lb-tot-cups').innerText = tot;
    updateCharUI();
}
function changeChar(d) {
    selIdx += d;
    if(selIdx < 0) selIdx = CHARS.length - 1;
    if(selIdx >= CHARS.length) selIdx = 0;
    updateCharUI();
}
function updateCharUI() {
    let c = CHARS[selIdx];
    document.getElementById('ch-img').innerText = c.e;
    document.getElementById('ch-name').innerText = c.n;
    document.getElementById('ch-s').innerText = c.s;
    document.getElementById('ch-p').innerText = c.p;
    document.getElementById('ch-t').innerText = c.t;
    document.getElementById('ch-cups').innerText = uData.cups[c.id] || 0;
}
function showLeaderboard() {
    switchScr('scr-lb');
    let list = document.getElementById('lb-list');
    list.innerHTML = 'Загрузка...';
    db.ref('users').once('value').then(s => {
        list.innerHTML = '';
        let arr = [];
        s.forEach(ch => {
            let d = ch.val();
            if(!d.cups) return;
            let t = 0; CHARS.forEach(c => t += (d.cups[c.id]||0));
            arr.push({a:d.av||'😺', n:d.nick||'Игрок', u:d.user||'user', c:t, w:d.wins||0});
        });
        arr.sort((a,b) => b.c - a.c).forEach((p, i) => {
            list.innerHTML += `<div class="lb-item">
                <div style="display:flex; gap:10px; align-items:center;">
                    <b style="color:#f5d300">#${i+1}</b>
                    <span style="font-size:24px">${p.a}</span>
                    <div style="display:flex; flex-direction:column;">
                        <span>${p.n}</span>
                        <span style="font-size:10px; color:#aaa">@${p.u}</span>
                    </div>
                </div>
                <div style="text-align:right;">
                    <div style="color:#ff9000">🏆 ${p.c}</div>
                    <div style="font-size:12px">Побед: ${p.w}</div>
                </div>
            </div>`;
        });
    });
}
function findMatch(t) {
    mType = t;
    document.getElementById('mod-match').style.display = 'flex';
    let tLeft = 3;
    document.getElementById('mm-timer').innerText = tLeft;
    let int = setInterval(() => {
        tLeft--;
        document.getElementById('mm-timer').innerText = tLeft;
        if(tLeft <= 0) { clearInterval(int); document.getElementById('mod-match').style.display = 'none'; initGame(); }
    }, 1000);
}
function initGame() {
    switchScr('scr-game');
    document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch;
    inGame = true; score = [0,0]; updateSc();
    let meC = CHARS[selIdx];
    let bot1C = CHARS[Math.floor(Math.random()*CHARS.length)];
    pList = [
        { id:1, x:cw*0.2, y:ch/2, r:meC.s, p:meC.p, e:meC.e, t:1, isMe:true },
        { id:2, x:cw*0.8, y:ch/2, r:bot1C.s, p:bot1C.p, e:bot1C.e, t:2, isMe:false }
    ];
    if(mType === 2) {
        let bot2C = CHARS[Math.floor(Math.random()*CHARS.length)];
        let bot3C = CHARS[Math.floor(Math.random()*CHARS.length)];
        pList.push({ id:3, x:cw*0.2, y:ch*0.2, r:bot2C.s, p:bot2C.p, e:bot2C.e, t:1, isMe:false });
        pList.push({ id:4, x:cw*0.8, y:ch*0.8, r:bot3C.s, p:bot3C.p, e:bot3C.e, t:2, isMe:false });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:15 };
    requestAnimationFrame(loop);
}
function resetPos() {
    pList.forEach(p => {
        p.x = p.t === 1 ? cw*0.2 : cw*0.8;
        p.y = p.id > 2 ? (p.t===1?ch*0.2:ch*0.8) : ch/2;
        p.vx = 0; p.vy = 0;
    });
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:15 };
}
function updateSc() {
    document.getElementById('sc1').innerText = score[0];
    document.getElementById('sc2').innerText = score[1];
}
function goal(team) {
    if(!inGame) return;
    score[team-1]++;
    updateSc();
    let gt = document.getElementById('txt-goal');
    gt.style.display = 'block';
    setTimeout(() => gt.style.display = 'none', 1000);
    if(score[0] >= 5 || score[1] >= 5) { inGame = false; setTimeout(() => endGame(score[0] >= 5), 1000); }
    else { setTimeout(resetPos, 1000); }
}
function loop() {
    if(!inGame) return;
    ctx.clearRect(0,0,cw,ch);
    ctx.fillStyle = '#2980b9'; ctx.beginPath(); ctx.roundRect(10, 10, cw-20, ch-20, 50); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cw/2, 10); ctx.lineTo(cw/2, ch-10); ctx.stroke();
    ctx.beginPath(); ctx.arc(cw/2, ch/2, 80, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(10, ch/2-100, 60, 200); ctx.fillRect(cw-70, ch/2-100, 60, 200);
    ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.98; ball.vy *= 0.98;
    if(ball.y < 30 || ball.y > ch-30) ball.vy *= -1;
    if(ball.x < 30 || ball.x > cw-30) {
        if(ball.y > ch/2-100 && ball.y < ch/2+100) { goal(ball.x < cw/2 ? 2 : 1); } else { ball.vx *= -1; }
    }
    
    for(let i=0; i<pList.length; i++) {
        for(let j=i+1; j<pList.length; j++) {
            let p1 = pList[i], p2 = pList[j];
            let dx = p2.x - p1.x, dy = p2.y - p1.y;
            let dist = Math.hypot(dx, dy);
            let minDist = p1.r + p2.r;
            if(dist < minDist) {
                let ang = Math.atan2(dy, dx);
                let overlap = minDist - dist;
                p1.x -= Math.cos(ang) * (overlap / 2);
                p1.y -= Math.sin(ang) * (overlap / 2);
                p2.x += Math.cos(ang) * (overlap / 2);
                p2.y += Math.sin(ang) * (overlap / 2);
            }
        }
    }

    pList.forEach(p => {
        if(p.isMe) {
            if(keys['KeyW']) p.y -= p.p; if(keys['KeyS']) p.y += p.p;
            if(keys['KeyA']) p.x -= p.p; if(keys['KeyD']) p.x += p.p;
        } else {
            let tx = ball.x, ty = ball.y;
            if(p.t === 2 && ball.x < cw/2) { tx = cw*0.7; ty = ch/2; }
            if(p.t === 1 && ball.x > cw/2) { tx = cw*0.3; ty = ch/2; }
            let dx = tx - p.x, dy = ty - p.y;
            let d = Math.hypot(dx, dy);
            if(d > 5) { p.x += (dx/d) * (p.p * 0.85); p.y += (dy/d) * (p.p * 0.85); }
        }
        
        if(p.t === 1) p.x = Math.max(p.r + 10, Math.min(cw/2 - p.r, p.x));
        else p.x = Math.max(cw/2 + p.r, Math.min(cw - p.r - 10, p.x));
        p.y = Math.max(p.r + 10, Math.min(ch - p.r - 10, p.y));

        let bd = Math.hypot(ball.x - p.x, ball.y - p.y);
        if(bd < p.r + ball.r) {
            let ang = Math.atan2(ball.y - p.y, ball.x - p.x);
            ball.vx = Math.cos(ang) * (p.p * 1.5); ball.vy = Math.sin(ang) * (p.p * 1.5);
            let overlap = (p.r + ball.r) - bd;
            ball.x += Math.cos(ang) * overlap; ball.y += Math.sin(ang) * overlap;
        }

        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.t === 1 ? '#0066ff' : '#ff3333'; ctx.fill();
        ctx.lineWidth = 4; ctx.strokeStyle = '#fff'; ctx.stroke();

        ctx.font = (p.r*1.2)+"px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(p.e, p.x, p.y);
        if(p.pin) { ctx.font = "35px Arial"; ctx.fillText(p.pin, p.x, p.y - p.r - 20); }
    });

    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    requestAnimationFrame(loop);
}
function endGame(w) {
    let t = document.getElementById('res-title');
    let ct = document.getElementById('res-cups');
    let cId = CHARS[selIdx].id;
    let old = uData.cups[cId] || 0;
    let diff = w ? 7 : -5;
    uData.cups[cId] = Math.max(0, old + diff);
    if(w) uData.wins++;
    db.ref('users/'+user.uid).set(uData);
    ct.innerText = diff > 0 ? "+"+diff : diff;
    document.getElementById('mod-res').style.display = 'flex';
}
function exitMatch() {
    document.getElementById('mod-res').style.display = 'none';
    document.getElementById('game-ui').style.display = 'none';
    renderLobby();
}
function sendPin(e) {
    let m = pList.find(p => p.isMe);
    if(m) { m.pin = e; setTimeout(() => m.pin = null, 2000); }
}
</script>
