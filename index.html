<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hockey Stars: Accounts & Shop</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; color: #fff; overflow: hidden; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: center; }
#game-container { position: relative; width: 100dvw; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0b1c3c; padding-bottom: env(safe-area-inset-bottom, 20px); }
canvas { max-width: 95%; max-height: 80dvh; aspect-ratio: 16 / 9; background: #2e86de; border: 4px solid #fff; border-radius: 60px; display: block; }
.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; text-align: center; }
.active { display: flex; }
.btn { background: #f5d300; color: #000; border: 4px solid #000; border-radius: 12px; padding: 12px 24px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #000; text-transform: uppercase; margin: 5px; min-width: 150px; }
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }
.btn-locked { background: #555; color: #aaa; cursor: not-allowed; }
.input-field { padding: 12px; font-size: 16px; border: 3px solid #000; border-radius: 10px; width: 280px; margin-bottom: 10px; text-align: center; }
.top-bar { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 20; }
.stat-box { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 10px; border: 2px solid #fff; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 14px; }
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
.score-board { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 3px solid #fff; padding: 5px 30px; border-radius: 15px; font-size: 24px; pointer-events: auto; }
#rotate-hint { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050c1a; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
@media (orientation: portrait) { #rotate-hint { display: flex; } }
</style>
</head>
<body>

<div id="rotate-hint"><h2>🔄 ПОВЕРНИ ТЕЛЕФОН</h2></div>

<div id="game-container">
    <div id="scr-auth" class="screen active">
        <h1 style="color:#f5d300; margin-bottom:20px;">HOCKEY STARS</h1>
        <input type="text" id="auth-user" class="input-field" placeholder="Логин (Username)">
        <input type="password" id="auth-pass" class="input-field" placeholder="Пароль">
        <div class="btn" onclick="tryAuth()">ВОЙТИ / СОЗДАТЬ</div>
        <p style="font-size:12px; margin-top:10px; color:#aaa;">Если логина нет, аккаунт создастся автоматически</p>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="top-bar">
            <div class="stat-box">
                <div style="display:flex; align-items:center; gap:5px;">
                    <span id="lb-av" style="font-size:20px;"></span>
                    <span id="lb-nick"></span>
                </div>
                <div style="font-size:11px; color:#aaa;">ID: <span id="lb-id"></span></div>
            </div>
            <div class="stat-box">
                <span style="color:#ff9000">🏆 <span id="lb-cups">0</span></span>
                <span style="color:#f5d300">💰 <span id="lb-coins">0</span></span>
            </div>
        </div>
        
        <div style="margin-top:40px;">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <div class="btn" style="min-width:60px" onclick="changeChar(-1)">◄</div>
                <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:20px; border:3px solid #fff; min-width:180px; position:relative;">
                    <div id="ch-img" style="font-size:70px;"></div>
                    <div id="ch-name" style="font-size:18px; color:#f5d300;"></div>
                    <div id="ch-info" style="font-size:12px; color:#ddd;"></div>
                </div>
                <div class="btn" style="min-width:60px" onclick="changeChar(1)">►</div>
            </div>
            
            <div id="char-actions"></div>
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <div class="btn btn-blue" onclick="startMode(1)">1 VS 1</div>
                <div class="btn btn-red" onclick="startMode(2)">2 VS 2</div>
            </div>
            <div class="btn btn-blue" style="width:100%" onclick="switchScr('scr-lb')">ТОП ИГРОКОВ</div>
        </div>
    </div>

    <div id="scr-game" class="screen" style="padding:0;">
        <canvas id="cvs"></canvas>
        <div id="game-ui">
            <div class="score-board"><span id="sc1" style="color:#0084ff">0</span> : <span id="sc2" style="color:#ff4747">0</span></div>
            <div class="btn btn-red" style="position:absolute; bottom:30px; right:30px; pointer-events:auto;" onclick="exitGame()">СДАТЬСЯ</div>
        </div>
    </div>

    <div id="scr-lb" class="screen">
        <h2>ТОП ПО КУБКАМ</h2>
        <div id="lb-list" style="width:90%; flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px; margin:10px 0;"></div>
        <div class="btn btn-red" onclick="switchScr('scr-lobby')">НАЗАД</div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CHARS = [
    {n:'Кейт', e:'🐱', size:1, power:1, price:0},
    {n:'Элен', e:'👽', size:1.2, power:0.8, price:25},
    {n:'Майни', e:'🐵', size:0.8, power:1.2, price:67},
    {n:'Замб', e:'🧟', size:2, power:1.2, price:104},
    {n:'Базз', e:'🐝', size:0.4, power:1.6, price:121},
    {n:'Гэст', e:'👻', size:1, power:1.5, price:155},
    {n:'Пуп', e:'💩', size:0.6, power:1.4, price:220},
    {n:'Клауни', e:'🤡', size:1.5, power:3, price:333}
];

let curUser = null, uData = null, selIdx = 0;
let inGame = false, mode = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1280, ch = 720, dragId = null;

function switchScr(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'scr-lb') renderLB();
}

function tryAuth() {
    let user = document.getElementById('auth-user').value.trim().toLowerCase();
    let pass = document.getElementById('auth-pass').value.trim();
    if(user.length < 3 || pass.length < 3) return alert("Минимум 3 символа!");

    db.ref('accounts/' + user).once('value', s => {
        if(s.exists()) {
            if(s.val().pass === pass) { login(user, s.val()); }
            else { alert("Неверный пароль!"); }
        } else {
            let newData = { pass, nick: user, av: '🐱', cups: 0, coins: 0, unlocked: ['Кейт'], selected: 0 };
            db.ref('accounts/' + user).set(newData).then(() => login(user, newData));
        }
    });
}

function login(id, data) {
    curUser = id;
    uData = data;
    selIdx = data.selected || 0;
    db.ref('accounts/' + id).on('value', s => { if(s.exists()) uData = s.val(); renderLobby(); });
}

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    document.getElementById('lb-id').innerText = curUser;
    document.getElementById('lb-cups').innerText = uData.cups;
    document.getElementById('lb-coins').innerText = uData.coins;
    updateCharUI();
}

function updateCharUI() {
    let c = CHARS[selIdx];
    document.getElementById('ch-img').innerText = c.e;
    document.getElementById('ch-name').innerText = c.n;
    document.getElementById('ch-info').innerText = `Сила: ${c.power} | Разм: ${c.size}`;
    
    let area = document.getElementById('char-actions');
    let isUnlocked = uData.unlocked.includes(c.n);
    
    if(isUnlocked) {
        area.innerHTML = selIdx === uData.selected ? 
            `<div class="btn btn-locked" style="width:100%">ВЫБРАНО</div>` : 
            `<div class="btn btn-blue" style="width:100%" onclick="selectChar()">ВЫБРАТЬ</div>`;
    } else {
        area.innerHTML = `<div class="btn" style="width:100%" onclick="buyChar()">КУПИТЬ ЗА ${c.price}💰</div>`;
    }
}

function selectChar() {
    db.ref('accounts/'+curUser).update({ selected: selIdx, av: CHARS[selIdx].e });
}

function buyChar() {
    let c = CHARS[selIdx];
    if(uData.coins >= c.price) {
        let newUnlocked = [...uData.unlocked, c.n];
        db.ref('accounts/'+curUser).update({ 
            coins: uData.coins - c.price, 
            unlocked: newUnlocked 
        });
    } else { alert("Не хватает монет!"); }
}

function changeChar(d) { selIdx = (selIdx + d + CHARS.length) % CHARS.length; updateCharUI(); }

// --- GAME LOGIC ---
function getPos(e) {
    let r = cvs.getBoundingClientRect();
    let t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (cw / r.width), y: (t.clientY - r.top) * (ch / r.height) };
}

cvs.addEventListener('touchstart', e => {
    if(!inGame) return;
    let p = getPos(e);
    let me = pList.find(pl => pl.isMe);
    if(me && Math.hypot(me.x - p.x, me.y - p.y) < me.r * 2) dragId = me.id;
});
cvs.addEventListener('touchmove', e => {
    if(!dragId || !inGame) return;
    e.preventDefault();
    let p = getPos(e);
    let me = pList.find(pl => pl.id === dragId);
    if(me) {
        me.x = Math.max(me.r + 45, Math.min(cw/2 - 10, p.x));
        me.y = Math.max(me.r + 45, Math.min(ch - me.r - 45, p.y));
    }
}, {passive:false});
window.addEventListener('touchend', () => dragId = null);

function startMode(m) { mode = m; initGame(); }

function initGame() {
    switchScr('scr-game');
    document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch;
    score = [0,0]; inGame = true; updateSc();
    
    let c = CHARS[uData.selected || 0];
    pList = [{ id:1, x:200, y:ch/2, r:30*c.size, p:c.power*8, e:c.e, t:1, isMe:true, stuck:0 }];
    
    // Бот
    let bc = CHARS[Math.floor(Math.random()*CHARS.length)];
    pList.push({ id:2, x:1080, y:ch/2, r:30*bc.size, p:bc.power*7, e:bc.e, t:2, isMe:false, stuck:0 });
    
    if(mode === 2) {
        pList.push({ id:3, x:200, y:150, r:35, p:7, e:'🦁', t:1, isMe:false, stuck:0 });
        pList.push({ id:4, x:1080, y:570, r:35, p:7, e:'🐯', t:2, isMe:false, stuck:0 });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:30 };
    requestAnimationFrame(loop);
}

function loop() {
    if(!inGame) return;
    ctx.fillStyle = '#2e86de'; ctx.fillRect(0,0,cw,ch);
    
    // Поле со скругленными углами
    let rad = 100;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.moveTo(40+rad, 40);
    ctx.lineTo(cw-40-rad, 40); ctx.arcTo(cw-40, 40, cw-40, 40+rad, rad);
    ctx.lineTo(cw-40, ch-40-rad); ctx.arcTo(cw-40, ch-40, cw-40-rad, ch-40, rad);
    ctx.lineTo(40+rad, ch-40); ctx.arcTo(40, ch-40, 40, ch-40-rad, rad);
    ctx.lineTo(40, 40+rad); ctx.arcTo(40, 40, 40+rad, 40, rad);
    ctx.stroke();
    
    ctx.beginPath(); ctx.moveTo(cw/2, 40); ctx.lineTo(cw/2, ch-40); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.fillRect(0, ch/2-140, 45, 280); ctx.fillRect(cw-45, ch/2-140, 45, 280);

    ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.985; ball.vy *= 0.985;

    // Физика бортов
    if(ball.y < 40+ball.r || ball.y > ch-40-ball.r) { ball.vy *= -1; ball.y = Math.max(40+ball.r, Math.min(ch-40-ball.r, ball.y)); }
    if(ball.x < 40+ball.r || ball.x > cw-40-ball.r) {
        if(ball.y > ch/2-140 && ball.y < ch/2+140) {
            if(ball.x<0 || ball.x>cw) { let team = ball.x<cw/2?2:1; score[team-1]++; updateSc(); resetRound(); }
        } else { ball.vx *= -1; ball.x = Math.max(40+ball.r, Math.min(cw-40-ball.r, ball.x)); }
    }

    pList.forEach(p => {
        if(!p.isMe) {
            let tx=ball.x, ty=ball.y;
            let dBall = Math.hypot(p.x-ball.x, p.y-ball.y);
            if(dBall < p.r+ball.r+5) p.stuck++; else p.stuck=0;
            if(p.stuck>40) { tx=p.t==1?100:cw-100; ty=ch/2; if(p.stuck>70) p.stuck=0; }
            else {
                if(p.t==2 && ball.x<cw/2) { tx=cw*0.8; ty=ch/2; }
                if(p.t==1 && ball.x>cw/2) { tx=cw*0.2; ty=ch/2; }
            }
            let dx=tx-p.x, dy=ty-p.y, d=Math.hypot(dx,dy);
            if(d>5) { p.x+=(dx/d)*p.p; p.y+=(dy/d)*p.p; }
            p.x = Math.max(p.t==2?cw/2+p.r:p.r+45, Math.min(p.t==2?cw-p.r-45:cw/2-p.r, p.x));
            p.y = Math.max(p.r+45, Math.min(ch-p.r-45, p.y));
        }
        let dP = Math.hypot(ball.x-p.x, ball.y-p.y);
        if(dP < p.r+ball.r) {
            let ang = Math.atan2(ball.y-p.y, ball.x-p.x);
            let force = Math.max(12, p.p * 1.5);
            ball.vx = Math.cos(ang)*force; ball.vy = Math.sin(ang)*force;
            ball.x = p.x + Math.cos(ang)*(p.r+ball.r+2);
            ball.y = p.y + Math.sin(ang)*(p.r+ball.r+2);
        }
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.t==1?'#0066ff':'#ff3333'; ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.stroke();
        ctx.font = (p.r)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.e, p.x, p.y);
    });
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(loop);
}

function updateSc() { document.getElementById('sc1').innerText=score[0]; document.getElementById('sc2').innerText=score[1]; }

function resetRound() {
    if(score[0]>=5 || score[1]>=5) { 
        inGame=false; 
        let win = score[0]>=5; 
        let coinsRew = win ? Math.floor(Math.random()*16)+5 : 0;
        let cupsRew = win ? 15 : -10;
        
        db.ref('accounts/'+curUser).update({
            cups: Math.max(0, uData.cups + cupsRew),
            coins: uData.coins + coinsRew
        });
        
        alert(win ? `ПОБЕДА!\n+${cupsRew}🏆  +${coinsRew}💰` : `ПРОИГРЫШ!\n-10🏆`);
        renderLobby(); return; 
    }
    ball={x:cw/2, y:ch/2, vx:0, vy:0, r:30};
    pList.forEach(p => { p.x=p.t==1?200:1080; p.y=p.id>2?(p.t==1?150:570):ch/2; p.stuck=0; });
}

function exitGame() { inGame = false; renderLobby(); }

function renderLB() {
    let list = document.getElementById('lb-list'); list.innerHTML = 'Загрузка...';
    db.ref('accounts').once('value', s => {
        let items = []; s.forEach(c => { let v=c.val(); v.id=c.key; items.push(v); });
        items.sort((a,b) => (b.cups||0)-(a.cups||0));
        list.innerHTML = '';
        items.slice(0, 15).forEach((d, i) => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.1); margin-bottom:5px; border-radius:8px; border:1px solid ${d.id===curUser?'#f5d300':'transparent'}">
                <span>#${i+1} ${d.av} ${d.nick}</span> <b>🏆 ${d.cups||0}</b>
            </div>`;
        });
    });
}
</script>
</body>
</html>
