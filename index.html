<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hockey Stars Pro</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #050c1a; color: #fff; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
#game-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0b1c3c; }
canvas { max-width: 100%; max-height: 100%; aspect-ratio: 16 / 9; background: #2e86de; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.active { display: flex; }
.btn { background: #f5d300; color: #000; border: 4px solid #000; border-radius: 8px; padding: 12px 24px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 0 #000; text-transform: uppercase; margin: 8px; }
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }
.input-field { padding: 12px; font-size: 16px; border: 3px solid #000; border-radius: 8px; width: 250px; margin-bottom: 10px; text-align: center; }
.top-bar { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; }
.stat-box { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 12px; border: 2px solid #fff; pointer-events: auto; display: flex; align-items: center; gap: 8px; }
#rotate-hint { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1c3c; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
@media (orientation: portrait) { #rotate-hint { display: flex; } }
.emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin: 10px; }
.emoji-btn { font-size: 24px; padding: 5px; cursor: pointer; border: 2px solid transparent; border-radius: 5px; }
.emoji-btn.sel { border-color: #00ff00; background: rgba(0,255,0,0.2); }
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
.score-board { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 3px solid #fff; padding: 5px 30px; border-radius: 15px; font-size: 28px; pointer-events: auto; }
</style>
</head>
<body>

<div id="rotate-hint">
    <div style="font-size: 50px;">🔄</div>
    <h2>Поверните телефон</h2>
    <p>Для игры нужен горизонтальный режим</p>
</div>

<div id="game-container">
    <div id="scr-auth" class="screen">
        <h1 style="color:#f5d300; margin-bottom: 20px;">HOCKEY STARS</h1>
        <input type="text" id="reg-nick" class="input-field" placeholder="Твой ник">
        <div class="emoji-grid" id="reg-emoji-grid"></div>
        <div class="btn" onclick="saveProfile(true)">ИГРАТЬ</div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="top-bar">
            <div class="stat-box" onclick="showProfileEdit()">
                <span id="lb-av"></span> <span id="lb-nick"></span> ⚙️
            </div>
            <div class="stat-box" style="color:#ff9000">🏆 <span id="lb-cups">0</span></div>
        </div>
        <div style="text-align:center;">
            <div style="display:flex; align-items:center; gap:30px; margin-bottom:20px;">
                <div class="btn" onclick="changeChar(-1)">◄</div>
                <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:20px; border:3px solid #fff; min-width:180px;">
                    <div id="ch-img" style="font-size:80px;"></div>
                    <h2 id="ch-name"></h2>
                </div>
                <div class="btn" onclick="changeChar(1)">►</div>
            </div>
            <div style="display:flex; justify-content:center; gap:10px;">
                <div class="btn btn-blue" onclick="startMode(1)">1 на 1</div>
                <div class="btn btn-red" onclick="startMode(2)">2 на 2</div>
            </div>
            <div class="btn" style="width:240px;" onclick="switchScr('scr-lb')">ЛИДЕРЫ</div>
        </div>
    </div>

    <div id="scr-game" class="screen" style="padding:0; background:#2e86de;">
        <canvas id="cvs"></canvas>
        <div id="game-ui">
            <div class="score-board">
                <span id="sc1" style="color:#0084ff">0</span> : <span id="sc2" style="color:#ff4747">0</span>
            </div>
            <div class="btn btn-red" style="position:absolute; bottom:20px; left:20px; font-size:14px; pointer-events:auto;" onclick="exitGame()">СДАТЬСЯ</div>
        </div>
    </div>

    <div id="scr-lb" class="screen">
        <h2 style="color:#f5d300; margin-bottom:15px;">МИРОВОЙ ТОП</h2>
        <div id="lb-container" style="width:80%; flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;"></div>
        <div class="btn btn-red" onclick="switchScr('scr-lobby')">В ЛОББИ</div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    storageBucket: "threecats-hockey.firebasestorage.app",
    messagingSenderId: "859200036415",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const CHARS = [
    {id:'c1', n:'Пуп', e:'💩', s:42, p:7}, {id:'c2', n:'Ям', e:'😋', s:55, p:5},
    {id:'c3', n:'Лайт', e:'⚡', s:38, p:10}, {id:'c4', n:'Гэст', e:'👻', s:45, p:8},
    {id:'c5', n:'Файер', e:'🔥', s:50, p:6}, {id:'c6', n:'Базз', e:'🐝', s:32, p:9},
    {id:'c7', n:'Пикз', e:'👾', s:58, p:4}, {id:'c8', n:'Скул', e:'💀', s:44, p:7},
    {id:'c9', n:'Клайни', e:'🤡', s:48, p:7}, {id:'c10', n:'Замб', e:'🧟', s:65, p:3}
];
const EMOJIS = ['😺','😎','👽','🤖','👻','💀','🤡','💩','🐵','🦊','🐯','🐸'];

let user, uData = null, selIdx = 0, selAv = '😺';
let inGame = false, mode = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1280, ch = 720, dragId = null;

function switchScr(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'scr-lb') renderLB();
}

auth.onAuthStateChanged(async u => {
    user = u || (await auth.signInAnonymously()).user;
    db.ref('users/'+user.uid).once('value', s => {
        if(s.exists()) { uData = s.val(); renderLobby(); }
        else { initEmojiGrid(); switchScr('scr-auth'); }
    });
});

function initEmojiGrid() {
    let g = document.getElementById('reg-emoji-grid'); g.innerHTML = '';
    EMOJIS.forEach(e => {
        let b = document.createElement('div'); b.className = 'emoji-btn' + (e===selAv?' sel':'');
        b.innerText = e; b.onclick = () => { selAv=e; initEmojiGrid(); }; g.appendChild(b);
    });
}

function saveProfile(isNew) {
    let nick = document.getElementById('reg-nick').value.trim();
    if(!nick) return;
    uData = { nick, av:selAv, cups: uData?uData.cups:0, wins: uData?uData.wins:0 };
    db.ref('users/'+user.uid).set(uData).then(renderLobby);
}

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    document.getElementById('lb-cups').innerText = uData.cups || 0;
    updateCharUI();
}

function updateCharUI() {
    document.getElementById('ch-img').innerText = CHARS[selIdx].e;
    document.getElementById('ch-name').innerText = CHARS[selIdx].n;
}
function changeChar(d) { selIdx = (selIdx + d + CHARS.length) % CHARS.length; updateCharUI(); }

function getPos(e) {
    let r = cvs.getBoundingClientRect();
    let t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (cw / r.width), y: (t.clientY - r.top) * (ch / r.height) };
}

cvs.addEventListener('touchstart', e => {
    if(!inGame) return;
    let p = getPos(e);
    let me = pList.find(pl => pl.isMe);
    if(me && Math.hypot(me.x - p.x, me.y - p.y) < me.r * 2.5) dragId = me.id;
});
cvs.addEventListener('touchmove', e => {
    if(!dragId || !inGame) return;
    e.preventDefault();
    let p = getPos(e);
    let me = pList.find(pl => pl.id === dragId);
    if(me) {
        me.x = p.x; me.y = p.y;
        me.x = Math.max(me.r + 40, Math.min(cw/2 - 10, me.x));
        me.y = Math.max(me.r + 40, Math.min(ch - me.r - 40, me.y));
    }
}, {passive:false});
window.addEventListener('touchend', () => dragId = null);

function startMode(m) { mode = m; initGame(); }

function initGame() {
    switchScr('scr-game');
    document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch;
    score = [0,0]; inGame = true; updateSc();
    
    let c = CHARS[selIdx];
    pList = [{ id:1, x:200, y:ch/2, r:c.s, p:c.p, e:c.e, t:1, isMe:true, stuckT:0 }];
    pList.push({ id:2, x:1080, y:ch/2, r:45, p:7.5, e:CHARS[Math.floor(Math.random()*CHARS.length)].e, t:2, isMe:false, stuckT:0 });
    
    if(mode === 2) {
        pList.push({ id:3, x:200, y:150, r:40, p:7, e:'🐱', t:1, isMe:false, stuckT:0 });
        pList.push({ id:4, x:1080, y:570, r:40, p:7, e:'🐶', t:2, isMe:false, stuckT:0 });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:30 };
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if(!inGame) return;
    ctx.fillStyle = '#2e86de'; ctx.fillRect(0,0,cw,ch);
    
    // Отрисовка поля со скругленными углами
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 12;
    ctx.beginPath();
    let r = 100; // Радиус скругления углов
    ctx.moveTo(40+r, 40);
    ctx.lineTo(cw-40-r, 40); ctx.arcTo(cw-40, 40, cw-40, 40+r, r);
    ctx.lineTo(cw-40, ch-40-r); ctx.arcTo(cw-40, ch-40, cw-40-r, ch-40, r);
    ctx.lineTo(40+r, ch-40); ctx.arcTo(40, ch-40, 40, ch-40-r, r);
    ctx.lineTo(40, 40+r); ctx.arcTo(40, 40, 40+r, 40, r);
    ctx.stroke();
    
    ctx.beginPath(); ctx.moveTo(cw/2, 40); ctx.lineTo(cw/2, ch-40); ctx.stroke();
    ctx.beginPath(); ctx.arc(cw/2, ch/2, 120, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.fillRect(0, ch/2-140, 45, 280); ctx.fillRect(cw-45, ch/2-140, 45, 280);

    // Физика шайбы
    ball.x += ball.vx; ball.y += ball.vy;
    ball.vx *= 0.985; ball.vy *= 0.985;

    // Жесткое ограничение бортов (Anti-Clip)
    if(ball.y < 40 + ball.r) { ball.y = 40 + ball.r; ball.vy *= -1; }
    if(ball.y > ch - 40 - ball.r) { ball.y = ch - 40 - ball.r; ball.vy *= -1; }
    
    if(ball.x < 40 + ball.r || ball.x > cw - 40 - ball.r) {
        if(ball.y > ch/2 - 140 && ball.y < ch/2 + 140) {
            if(ball.x < 0 || ball.x > cw) {
                let team = ball.x < cw/2 ? 2 : 1; score[team-1]++; updateSc(); resetRound();
            }
        } else {
            if(ball.x < 40 + ball.r) { ball.x = 40 + ball.r; ball.vx *= -1; }
            else { ball.x = cw - 40 - ball.r; ball.vx *= -1; }
        }
    }

    // Скругленные углы (физика рикошета)
    const corners = [{x:40+r, y:40+r}, {x:cw-40-r, y:40+r}, {x:40+r, y:ch-40-r}, {x:cw-40-r, y:ch-40-r}];
    corners.forEach(c => {
        let dist = Math.hypot(ball.x - c.x, ball.y - c.y);
        if(dist > r - ball.r) {
            let inCorner = false;
            if(c.x < cw/2 && c.y < ch/2 && ball.x < c.x && ball.y < c.y) inCorner = true;
            if(c.x > cw/2 && c.y < ch/2 && ball.x > c.x && ball.y < c.y) inCorner = true;
            if(c.x < cw/2 && c.y > ch/2 && ball.x < c.x && ball.y > c.y) inCorner = true;
            if(c.x > cw/2 && c.y > ch/2 && ball.x > c.x && ball.y > c.y) inCorner = true;
            
            if(inCorner) {
                let ang = Math.atan2(ball.y - c.y, ball.x - c.x);
                ball.x = c.x + Math.cos(ang) * (r - ball.r);
                ball.y = c.y + Math.sin(ang) * (r - ball.r);
                ball.vx *= -1; ball.vy *= -1;
            }
        }
    });

    pList.forEach(p => {
        if(!p.isMe) {
            let tx = ball.x, ty = ball.y;
            // Логика застревания
            let distToBall = Math.hypot(p.x - ball.x, p.y - ball.y);
            if(distToBall < p.r + ball.r + 5) p.stuckT++; else p.stuckT = 0;

            if(p.stuckT > 80) { // Если застрял на 1.3 сек
                tx = p.t === 1 ? 100 : cw-100; ty = ch/2;
                if(p.stuckT > 120) p.stuckT = 0; 
            } else {
                if(p.t === 2 && ball.x < cw/2) { tx = cw*0.85; ty = ch/2; }
                if(p.t === 1 && ball.x > cw/2) { tx = cw*0.15; ty = ch/2; }
            }
            let dx = tx - p.x, dy = ty - p.y, d = Math.hypot(dx, dy);
            if(d > 5) { p.x += (dx/d)*p.p; p.y += (dy/d)*p.p; }
            
            if(p.t === 2) p.x = Math.max(cw/2 + p.r, Math.min(cw - p.r - 40, p.x));
            else p.x = Math.max(p.r + 40, Math.min(cw/2 - p.r, p.x));
            p.y = Math.max(p.r + 40, Math.min(ch - p.r - 40, p.y));
        }

        let dP = Math.hypot(ball.x - p.x, ball.y - p.y);
        if(dP < p.r + ball.r) {
            let ang = Math.atan2(ball.y - p.y, ball.x - p.x);
            let force = Math.max(12, p.p * 1.8);
            ball.vx = Math.cos(ang) * force; ball.vy = Math.sin(ang) * force;
            // Выталкивание шайбы из игрока (чтобы не проталкивали сквозь стены)
            ball.x = p.x + Math.cos(ang) * (p.r + ball.r + 2);
            ball.y = p.y + Math.sin(ang) * (p.r + ball.r + 2);
        }

        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.t === 1 ? '#0066ff' : '#ff3333'; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 6; ctx.stroke();
        ctx.font = (p.r*1.2)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.e, p.x, p.y);
    });

    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.stroke();
    requestAnimationFrame(gameLoop);
}

function updateSc() { document.getElementById('sc1').innerText = score[0]; document.getElementById('sc2').innerText = score[1]; }
function resetRound() {
    if(score[0] >= 5 || score[1] >= 5) { finishGame(score[0] >= 5); return; }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:30 };
    pList.forEach(p => { p.x = p.t === 1 ? 200 : 1080; p.y = p.id > 2 ? (p.t===1?150:570) : ch/2; p.stuckT = 0; });
}

function finishGame(win) {
    inGame = false;
    let rew = win ? 15 : -10;
    uData.cups = Math.max(0, (uData.cups || 0) + rew);
    db.ref('users/'+user.uid).update(uData);
    alert(win ? "ПОБЕДА! +15🏆" : "ПРОИГРЫШ! -10🏆");
    renderLobby();
}

function exitGame() { inGame = false; renderLobby(); }

function renderLB() {
    let cont = document.getElementById('lb-container'); cont.innerHTML = 'Загрузка...';
    db.ref('users').orderByChild('cups').limitToLast(20).once('value', s => {
        cont.innerHTML = ''; let items = [];
        s.forEach(c => items.push(c.val()));
        items.reverse().forEach((d, i) => {
            cont.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; background:rgba(255,255,255,0.1); margin-bottom:8px; border-radius:10px; border-left: 5px solid ${i<3?'#f5d300':'#fff'}">
                <span>#${i+1} ${d.av} ${d.nick}</span> <b>🏆 ${d.cups || 0}</b>
            </div>`;
        });
    });
}
</script>
</body>
</html>
