<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hockey Stars Mobile</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #0b1c3c; color: #fff; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }
.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; z-index: 10; padding: 20px; }
.active { display: flex; }
.btn { background: #f5d300; color: #000; border: 4px solid #000; border-radius: 12px; padding: 12px 20px; font-size: 18px; cursor: pointer; box-shadow: 0 5px 0 #000; text-transform: uppercase; margin: 5px; text-align: center; }
.btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }
.input-field { padding: 12px; font-size: 16px; border: 4px solid #000; border-radius: 10px; width: 90%; max-width: 300px; margin-bottom: 10px; background: #fff; color: #000; text-align: center; }
.emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 10px 0; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; }
.emoji-item { font-size: 24px; padding: 5px; border-radius: 8px; border: 2px solid transparent; }
.emoji-item.sel { border-color: #00ff00; background: rgba(0,255,0,0.2); }
.top-bar { width: 95%; display: flex; justify-content: space-between; margin-top: env(safe-area-inset-top); z-index: 50; }
.profile-box { background: rgba(0,0,0,0.8); border: 3px solid #000; border-radius: 10px; padding: 5px 10px; display: flex; align-items: center; gap: 8px; min-width: 120px; }
.lobby-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
.char-display { text-align: center; transform: scale(1.1); }
.char-img { font-size: 100px; filter: drop-shadow(0 10px 0 rgba(0,0,0,0.5)); }
.bottom-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: env(safe-area-inset-bottom); padding-bottom: 10px; }
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }
.score-board { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #000; border: 3px solid #fff; padding: 5px 20px; border-radius: 10px; font-size: 24px; pointer-events: auto; display: flex; gap: 15px; }
canvas { width: 100%; height: 100%; object-fit: cover; display: block; background: #2e86de; }
.room-input { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; margin-top: 10px; }
</style>
</head>
<body>
<div id="loading-scr" style="position:fixed; width:100%; height:100%; background:#0b1c3c; z-index:2000; display:flex; justify-content:center; align-items:center;">ЗАГРУЗКА...</div>

<div id="scr-auth" class="screen">
    <h1 style="color: #f5d300; margin: 10px 0;">HOCKEY STARS</h1>
    <input type="text" id="reg-nick" class="input-field" placeholder="Твой Никнейм">
    <div class="emoji-grid" id="reg-av-grid"></div>
    <div class="btn" onclick="saveAuth()">ИГРАТЬ</div>
</div>

<div id="scr-lobby" class="screen">
    <div class="top-bar">
        <div class="profile-box">
            <span id="lb-av" style="font-size: 24px;"></span>
            <span id="lb-nick" style="font-size: 14px; overflow: hidden; max-width: 80px;"></span>
        </div>
        <div class="profile-box" style="color:#ff9000; justify-content: center;">🏆 <span id="lb-tot-cups">0</span></div>
    </div>
    <div class="lobby-center">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="btn" onclick="changeChar(-1)">◄</div>
            <div class="char-display">
                <div id="ch-img" class="char-img">💩</div>
                <h3 id="ch-name" style="margin: 5px 0;">Пуп</h3>
            </div>
            <div class="btn" onclick="changeChar(1)">►</div>
        </div>
        <div class="room-input">
            <input type="text" id="join-room-id" class="input-field" placeholder="Код комнаты" style="margin:0; font-size: 14px;">
            <div style="display:flex; gap:5px;">
                <div class="btn btn-blue" style="font-size:14px; flex:1;" onclick="createRoom()">СОЗДАТЬ</div>
                <div class="btn" style="font-size:14px; flex:1;" onclick="joinRoom()">ЗАЙТИ</div>
            </div>
        </div>
    </div>
    <div style="font-size:12px; margin: 10px 0;">ОНЛАЙН: <span id="real-online">0</span></div>
    <div class="bottom-bar">
        <div class="btn btn-blue" onclick="findMatch(1)">1 VS 1</div>
        <div class="btn btn-red" onclick="findMatch(2)">2 VS 2</div>
        <div class="btn" onclick="showLeaderboard()">ТОП</div>
    </div>
</div>

<div id="scr-game" class="screen" style="padding:0;">
    <canvas id="cvs"></canvas>
    <div id="game-ui">
        <div class="score-board">
            <span id="sc1" style="color:#0084ff">0</span>
            <span>:</span>
            <span id="sc2" style="color:#ff4747">0</span>
        </div>
        <div style="position:absolute; bottom: 20px; right: 20px; pointer-events: auto;">
            <div class="btn btn-red" onclick="exitMatch()" style="font-size:12px; padding:8px;">ВЫЙТИ</div>
        </div>
    </div>
</div>

<div id="scr-lb" class="screen">
    <h2 style="color:#f5d300;">ТОП ИГРОКОВ</h2>
    <div id="lb-list" style="width:100%; overflow-y:auto; flex:1;"></div>
    <div class="btn btn-red" onclick="switchScr('scr-lobby')">НАЗАД</div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    storageBucket: "threecats-hockey.firebasestorage.app",
    messagingSenderId: "859200036415",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const CHARS = [
    {id:'c1', n:'💩 Пуп', e:'💩', s:40, p:7}, {id:'c2', n:'😋 Ям', e:'😋', s:50, p:5},
    {id:'c3', n:'⚡ Лайт', e:'⚡', s:35, p:10}, {id:'c4', n:'🤡 Клоун', e:'🤡', s:45, p:6}
];
const EMOJIS = ['😺','😎','👽','🤖','👻','💀','🤡','💩','🐵','🦊'];
let user, uData = null, selIdx = 0, selAv = '😺';
let inGame = false, mType = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1200, ch = 800; // Увеличенная карта
let dragId = null;

// Загрузка данных
function loadLocal() {
    const saved = localStorage.getItem('hockey_user');
    return saved ? JSON.parse(saved) : null;
}

function switchScr(id) {
    document.getElementById('loading-scr').style.display = 'none';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

auth.onAuthStateChanged(async u => {
    user = u || (await auth.signInAnonymously()).user;
    db.ref('online/' + user.uid).set(true);
    db.ref('online/' + user.uid).onDisconnect().remove();
    db.ref('online').on('value', s => document.getElementById('real-online').innerText = s.numChildren());

    const local = loadLocal();
    db.ref('users/'+user.uid).once('value', s => {
        if(s.exists()) { uData = s.val(); renderLobby(); }
        else if(local) { uData = local; db.ref('users/'+user.uid).set(uData); renderLobby(); }
        else { initReg(); switchScr('scr-auth'); }
    });
});

function initReg() {
    let g = document.getElementById('reg-av-grid'); g.innerHTML = '';
    EMOJIS.forEach(e => {
        let d = document.createElement('div'); d.className = 'emoji-item' + (e===selAv?' sel':'');
        d.innerText = e; d.onclick = () => { selAv=e; initReg(); }; g.appendChild(d);
    });
}

function saveAuth() {
    let n = document.getElementById('reg-nick').value.trim();
    if(!n) return;
    uData = { nick:n, av:selAv, wins:0, cups:{} };
    CHARS.forEach(c => uData.cups[c.id] = 0);
    localStorage.setItem('hockey_user', JSON.stringify(uData));
    db.ref('users/'+user.uid).set(uData).then(renderLobby);
}

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    let t = 0; Object.values(uData.cups || {}).forEach(v => t += v);
    document.getElementById('lb-tot-cups').innerText = t;
    updateCharUI();
}

function updateCharUI() {
    document.getElementById('ch-img').innerText = CHARS[selIdx].e;
    document.getElementById('ch-name').innerText = CHARS[selIdx].n;
}
function changeChar(d) { selIdx = (selIdx + d + CHARS.length) % CHARS.length; updateCharUI(); }

// Геймплей и управление
function getPos(e) {
    let r = cvs.getBoundingClientRect();
    let touch = e.touches ? e.touches[0] : e;
    return { x: (touch.clientX - r.left) * (cw / r.width), y: (touch.clientY - r.top) * (ch / r.height) };
}

cvs.addEventListener('touchstart', e => {
    if(!inGame) return;
    let p = getPos(e);
    let me = pList.find(pl => pl.isMe);
    if(me && Math.hypot(me.x - p.x, me.y - p.y) < me.r * 2.5) dragId = me.id;
}, {passive: false});

cvs.addEventListener('touchmove', e => {
    if(!dragId || !inGame) return;
    e.preventDefault();
    let p = getPos(e);
    let me = pList.find(pl => pl.id === dragId);
    if(me) { 
        me.x = p.x; me.y = p.y; 
        // Ограничение половины поля
        me.x = Math.max(me.r + 20, Math.min(cw/2 - 10, me.x));
        me.y = Math.max(me.r + 20, Math.min(ch - me.r - 20, me.y));
    }
}, {passive: false});

window.addEventListener('touchend', () => dragId = null);

function initGame() {
    switchScr('scr-game');
    document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch;
    score = [0,0]; updateSc(); inGame = true;
    
    pList = [
        { id:1, x:200, y:ch/2, r:CHARS[selIdx].s, p:CHARS[selIdx].p, e:CHARS[selIdx].e, t:1, isMe:true },
        { id:2, x:1000, y:ch/2, r:45, p:7, e:CHARS[Math.floor(Math.random()*4)].e, t:2, isMe:false }
    ];
    if(mType === 2) {
        pList.push({ id:3, x:200, y:200, r:40, p:7, e:'🐱', t:1, isMe:false });
        pList.push({ id:4, x:1000, y:600, r:40, p:7, e:'🐶', t:2, isMe:false });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:25 };
    requestAnimationFrame(loop);
}

function loop() {
    if(!inGame) return;
    ctx.fillStyle = '#2e86de'; ctx.fillRect(0,0,cw,ch);
    // Разметка
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 8;
    ctx.strokeRect(20, 20, cw-40, ch-40);
    ctx.beginPath(); ctx.moveTo(cw/2, 20); ctx.lineTo(cw/2, ch-20); ctx.stroke();
    ctx.beginPath(); ctx.arc(cw/2, ch/2, 100, 0, Math.PI*2); ctx.stroke();
    // Ворота
    ctx.fillStyle = '#fff'; ctx.fillRect(0, ch/2-120, 30, 240); ctx.fillRect(cw-30, ch/2-120, 30, 240);

    // Физика шайбы
    ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.985; ball.vy *= 0.985;
    if(ball.y < 50 || ball.y > ch-50) ball.vy *= -1;
    if(ball.x < 50 || ball.x > cw-50) {
        if(ball.y > ch/2-120 && ball.y < ch/2+120) { 
            let team = ball.x < cw/2 ? 2 : 1; score[team-1]++; updateSc(); resetGame();
        } else { ball.vx *= -1; }
    }

    pList.forEach(p => {
        if(!p.isMe) { // ИИ ботов
            let tx = ball.x, ty = ball.y;
            // Логика защиты
            if(p.t === 2 && ball.x < cw/2) { tx = cw*0.85; ty = ch/2; }
            if(p.t === 1 && ball.x > cw/2) { tx = cw*0.15; ty = ch/2; }
            let dx = tx - p.x, dy = ty - p.y, dist = Math.hypot(dx, dy);
            if(dist > 5) { p.x += (dx/dist)*p.p; p.y += (dy/dist)*p.p; }
            // Ограничения поля для бота
            if(p.t === 2) p.x = Math.max(cw/2 + p.r, Math.min(cw - p.r - 30, p.x));
            else p.x = Math.max(p.r + 30, Math.min(cw/2 - p.r, p.x));
            p.y = Math.max(p.r + 30, Math.min(ch - p.r - 30, p.y));
        }

        // Хитбоксы
        let dBall = Math.hypot(ball.x - p.x, ball.y - p.y);
        if(dBall < p.r + ball.r) {
            let ang = Math.atan2(ball.y - p.y, ball.x - p.x);
            ball.vx = Math.cos(ang) * 15; ball.vy = Math.sin(ang) * 15;
        }

        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.t === 1 ? '#0066ff' : '#ff3333'; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.stroke();
        ctx.font = (p.r*1.2)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText(p.e, p.x, p.y);
    });

    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
    requestAnimationFrame(loop);
}

function updateSc() { document.getElementById('sc1').innerText = score[0]; document.getElementById('sc2').innerText = score[1]; }
function resetGame() {
    pList.forEach(p => { p.x = p.t === 1 ? 200 : 1000; p.y = ch/2; });
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:25 };
    if(score[0] >= 5 || score[1] >= 5) exitMatch(score[0] >= 5);
}

function exitMatch(win = false) {
    inGame = false;
    if(win !== null) {
        let cId = CHARS[selIdx].id; uData.cups[cId] = (uData.cups[cId] || 0) + (win ? 10 : -5);
        if(win) uData.wins++;
        db.ref('users/'+user.uid).set(uData);
        localStorage.setItem('hockey_user', JSON.stringify(uData));
    }
    renderLobby();
}

function findMatch() { initGame(); }
function createRoom() { 
    let id = Math.floor(1000 + Math.random()*9000); 
    document.getElementById('join-room-id').value = id; 
    alert("Код комнаты: " + id + ". Дай его другу!"); 
}
function joinRoom() { 
    if(document.getElementById('join-room-id').value) initGame(); 
}

function showLeaderboard() {
    switchScr('scr-lb');
    db.ref('users').limitToLast(10).once('value', s => {
        let l = document.getElementById('lb-list'); l.innerHTML = '';
        s.forEach(u => {
            let d = u.val();
            l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(0,0,0,0.3); margin:5px; border-radius:10px;">
                <span>${d.av} ${d.nick}</span> <b>🏆 ${Object.values(d.cups||{}).reduce((a,b)=>a+b,0)}</b>
            </div>`;
        });
    });
}
</script>
</body>
</html>
