<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hockey Stars: Settings & Fair Play</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; color: #fff; overflow: hidden; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: center; }
#game-container { position: relative; width: 100dvw; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0b1c3c; padding-bottom: env(safe-area-inset-bottom, 20px); }
canvas { max-width: 95%; max-height: 80dvh; aspect-ratio: 16 / 9; background: #2e86de; border: 4px solid #fff; border-radius: 60px; display: block; }
.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; text-align: center; }
.active { display: flex; }
.btn { background: #f5d300; color: #000; border: 3px solid #000; border-radius: 10px; padding: 8px 16px; font-size: 14px; cursor: pointer; box-shadow: 0 4px 0 #000; text-transform: uppercase; margin: 4px; min-width: 120px; }
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }
.btn-locked { background: #444; color: #888; border-color: #222; box-shadow: 0 4px 0 #222; }
.input-field { padding: 10px; font-size: 14px; border: 3px solid #000; border-radius: 10px; width: 260px; margin-bottom: 8px; text-align: center; }
.top-bar { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 20; }
.stat-box { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 10px; border: 2px solid #fff; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 13px; }
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
.emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 10px 0; max-height: 120px; overflow-y: auto; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
.emoji-btn { font-size: 24px; padding: 5px; cursor: pointer; border: 3px solid transparent; border-radius: 8px; }
.emoji-btn.sel { border-color: #f5d300; background: rgba(245,211,0,0.2); }
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
.score-board { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 3px solid #fff; padding: 4px 20px; border-radius: 12px; font-size: 20px; pointer-events: auto; }
#rotate-hint { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050c1a; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
@media (orientation: portrait) { #rotate-hint { display: flex; } }
</style>
</head>
<body>

<div id="rotate-hint"><h2>🔄 ПОВЕРНИ ТЕЛЕФОН</h2></div>

<div id="game-container">
    <div id="scr-auth" class="screen active">
        <h1 style="color:#f5d300; margin-bottom:20px; font-size: 28px;">HOCKEY STARS</h1>
        <input type="text" id="auth-user" class="input-field" placeholder="Логин (ID)">
        <input type="password" id="auth-pass" class="input-field" placeholder="Пароль">
        <div class="btn" onclick="tryAuth()">ВХОД / РЕГИСТРАЦИЯ</div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="top-bar">
            <div class="stat-box" onclick="openSettings()" style="cursor:pointer">
                <div style="display:flex; align-items:center; gap:5px;">
                    <span id="lb-av" style="font-size:18px;"></span>
                    <span id="lb-nick"></span> ⚙️
                </div>
                <div style="font-size:10px; color:#aaa;">ID: <span id="lb-id"></span></div>
            </div>
            <div class="stat-box">
                <span style="color:#ff9000">🏆 <span id="lb-cups">0</span></span>
                <span style="color:#f5d300">💰 <span id="lb-coins">0</span></span>
            </div>
        </div>
        
        <div style="margin-top:30px;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <div class="btn" style="min-width:40px; padding:5px;" onclick="changeChar(-1)">◄</div>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:15px; border:2px solid #fff; min-width:140px;">
                    <div id="ch-img" style="font-size:50px;"></div>
                    <div id="ch-name" style="font-size:16px; color:#f5d300;"></div>
                    <div id="ch-info" style="font-size:11px; color:#ddd;"></div>
                </div>
                <div class="btn" style="min-width:40px; padding:5px;" onclick="changeChar(1)">►</div>
            </div>
            <div id="char-actions"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <div class="btn btn-blue" onclick="startMode(1)">1 VS 1</div>
                <div class="btn btn-red" onclick="startMode(2)">2 VS 2</div>
            </div>
            <div class="btn btn-blue" style="width:100%; font-size:12px;" onclick="switchScr('scr-lb')">ТОП ИГРОКОВ</div>
        </div>
    </div>

    <div id="scr-game" class="screen" style="padding:0;">
        <canvas id="cvs"></canvas>
        <div id="game-ui">
            <div class="score-board"><span id="sc1" style="color:#0084ff">0</span> : <span id="sc2" style="color:#ff4747">0</span></div>
            <div class="btn btn-red" style="position:absolute; bottom:20px; right:20px; font-size:12px; pointer-events:auto;" onclick="exitGame()">СДАТЬСЯ</div>
        </div>
    </div>

    <div id="scr-lb" class="screen">
        <h2 style="font-size: 20px;">ГЛОБАЛЬНЫЙ ТОП</h2>
        <div id="lb-list" style="width:90%; flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px; margin:10px 0;"></div>
        <div class="btn btn-red" onclick="switchScr('scr-lobby')">НАЗАД</div>
    </div>

    <div id="mod-settings" class="overlay">
        <h3>НАСТРОЙКИ</h3>
        <input type="text" id="set-nick" class="input-field" placeholder="Ник">
        <input type="text" id="set-id" class="input-field" placeholder="Новый ID">
        <input type="password" id="set-pass" class="input-field" placeholder="Новый Пароль">
        <div class="emoji-grid" id="set-emoji-grid"></div>
        <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px;">
            <div class="btn btn-blue" onclick="saveSettings()">СОХРАНИТЬ</div>
            <div class="btn btn-red" onclick="closeSettings()">ЗАКРЫТЬ</div>
            <div class="btn" style="background:#555; color:#fff;" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CHARS = [
    {n:'Кейт', e:'🐱', size:1, power:1, price:0},
    {n:'Элен', e:'👽', size:1.2, power:0.8, price:25},
    {n:'Майни', e:'🐵', size:0.8, power:1.2, price:67},
    {n:'Замб', e:'🧟', size:2, power:1.2, price:104},
    {n:'Базз', e:'🐝', size:0.4, power:1.6, price:121},
    {n:'Гэст', e:'👻', size:1, power:1.5, price:155},
    {n:'Пуп', e:'💩', size:0.6, power:1.4, price:220},
    {n:'Клауни', e:'🤡', size:1.5, power:3, price:333}
];
const EMOJIS = ['😺','😎','👽','🤖','👻','💀','🤡','💩','🐵','🦊','🐯','🐸','🐙','🎮','🏆','🔥','💎','🚀','🛸','🌟'];

let curUser = null, uData = null, selIdx = 0, tempAv = '🐱';
let inGame = false, mode = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1280, ch = 720, dragId = null, cornRad = 100;

// Авто-вход
window.onload = () => {
    let saved = localStorage.getItem('hockey_id');
    if(saved) {
        db.ref('accounts/' + saved).once('value', s => {
            if(s.exists()) login(saved, s.val());
            else localStorage.removeItem('hockey_id');
        });
    }
};

function switchScr(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'scr-lb') renderLB();
}

function tryAuth() {
    let user = document.getElementById('auth-user').value.trim().toLowerCase();
    let pass = document.getElementById('auth-pass').value.trim();
    if(user.length < 3 || pass.length < 3) return alert("Минимум 3 символа!");
    db.ref('accounts/' + user).once('value', s => {
        if(s.exists()) {
            if(s.val().pass === pass) login(user, s.val());
            else alert("Неверный пароль!");
        } else {
            let newData = { pass, nick: user, av: '🐱', cups: 0, coins: 0, unlocked: ['Кейт'], selected: 0 };
            db.ref('accounts/' + user).set(newData).then(() => login(user, newData));
        }
    });
}

function login(id, data) {
    curUser = id; uData = data; selIdx = data.selected || 0;
    localStorage.setItem('hockey_id', id);
    db.ref('accounts/' + id).on('value', s => { if(s.exists()) { uData = s.val(); renderLobby(); } });
}

function logout() { localStorage.removeItem('hockey_id'); location.reload(); }

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    document.getElementById('lb-id').innerText = curUser;
    document.getElementById('lb-cups').innerText = uData.cups;
    document.getElementById('lb-coins').innerText = uData.coins;
    updateCharUI();
}

function updateCharUI() {
    let c = CHARS[selIdx];
    document.getElementById('ch-img').innerText = c.e;
    document.getElementById('ch-name').innerText = c.n;
    document.getElementById('ch-info').innerText = `Сила: ${c.power} | Разм: ${c.size}`;
    let area = document.getElementById('char-actions');
    let isUnlocked = uData.unlocked.includes(c.n);
    if(isUnlocked) {
        area.innerHTML = selIdx === uData.selected ? `<div class="btn btn-locked" style="width:100%">АКТИВЕН</div>` : `<div class="btn btn-blue" style="width:100%" onclick="selectChar()">ВЫБРАТЬ</div>`;
    } else {
        area.innerHTML = `<div class="btn" style="width:100%" onclick="buyChar()">КУПИТЬ: ${c.price}💰</div>`;
    }
}

function selectChar() { db.ref('accounts/'+curUser).update({ selected: selIdx }); }
function buyChar() {
    let c = CHARS[selIdx];
    if(uData.coins >= c.price) {
        let newUnlocked = [...uData.unlocked, c.n];
        db.ref('accounts/'+curUser).update({ coins: uData.coins - c.price, unlocked: newUnlocked });
    } else alert("Не хватает монет!");
}
function changeChar(d) { selIdx = (selIdx + d + CHARS.length) % CHARS.length; updateCharUI(); }

function openSettings() {
    tempAv = uData.av; document.getElementById('set-nick').value = uData.nick;
    document.getElementById('set-id').value = curUser;
    document.getElementById('set-pass').value = uData.pass;
    renderSettingsEmoji();
    document.getElementById('mod-settings').style.display = 'flex';
}
function renderSettingsEmoji() {
    let grid = document.getElementById('set-emoji-grid'); grid.innerHTML = '';
    EMOJIS.forEach(e => {
        let b = document.createElement('div'); b.className = 'emoji-btn' + (e===tempAv?' sel':'');
        b.innerText = e; b.onclick = () => { tempAv=e; renderSettingsEmoji(); }; grid.appendChild(b);
    });
}
function closeSettings() { document.getElementById('mod-settings').style.display = 'none'; }

async function saveSettings() {
    let newNick = document.getElementById('set-nick').value.trim();
    let newId = document.getElementById('set-id').value.trim().toLowerCase();
    let newPass = document.getElementById('set-pass').value.trim();
    if(newNick.length < 2 || newId.length < 3 || newPass.length < 3) return alert("Заполни все поля!");

    if(newNick !== uData.nick) {
        let snap = await db.ref('accounts').orderByChild('nick').equalTo(newNick).once('value');
        if(snap.exists()) return alert("Этот ник занят!");
    }
    
    if(newId !== curUser) {
        let snapId = await db.ref('accounts/' + newId).once('value');
        if(snapId.exists()) return alert("Этот ID занят!");
        let oldData = {...uData, nick: newNick, av: tempAv, pass: newPass};
        await db.ref('accounts/' + newId).set(oldData);
        await db.ref('accounts/' + curUser).remove();
        login(newId, oldData);
    } else {
        db.ref('accounts/'+curUser).update({ nick: newNick, av: tempAv, pass: newPass });
    }
    closeSettings();
}

// --- GAME ---
function getPos(e) {
    let r = cvs.getBoundingClientRect(); let t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (cw / r.width), y: (t.clientY - r.top) * (ch / r.height) };
}
cvs.addEventListener('touchstart', e => {
    if(!inGame) return; let p = getPos(e); let me = pList.find(pl => pl.isMe);
    if(me && Math.hypot(me.x - p.x, me.y - p.y) < me.r * 2) dragId = me.id;
});
cvs.addEventListener('touchmove', e => {
    if(!dragId || !inGame) return; e.preventDefault();
    let p = getPos(e); let me = pList.find(pl => pl.id === dragId);
    if(me) {
        me.x = Math.max(me.r + 45, Math.min(cw/2 - 10, p.x));
        me.y = Math.max(me.r + 45, Math.min(ch - me.r - 45, p.y));
    }
}, {passive:false});
window.addEventListener('touchend', () => dragId = null);

function startMode(m) { mode = m; initGame(); }

function initGame() {
    switchScr('scr-game'); document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch; score = [0,0]; inGame = true; updateSc();
    let c = CHARS[uData.selected || 0];
    pList = [{ id:1, x:200, y:ch/2, r:30*c.size, p:c.power*8, e:c.e, t:1, isMe:true, delay:0 }];
    
    let bc = CHARS[Math.floor(Math.random()*CHARS.length)];
    pList.push({ id:2, x:1080, y:ch/2, r:30*bc.size, p:bc.power*6.5, e:bc.e, t:2, isMe:false, role:'striker', delay:0 });
    
    if(mode === 2) {
        pList.push({ id:3, x:200, y:150, r:35, p:7, e:'🦁', t:1, isMe:false, role:'goalkeeper', delay:0 });
        pList.push({ id:4, x:1080, y:200, r:35, p:6, e:'🐯', t:2, isMe:false, role:'goalkeeper', delay:0 });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:28 };
    requestAnimationFrame(loop);
}

function loop() {
    if(!inGame) return;
    ctx.fillStyle = '#2e86de'; ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.moveTo(40+cornRad, 40); ctx.lineTo(cw-40-cornRad, 40); ctx.arcTo(cw-40, 40, cw-40, 40+cornRad, cornRad);
    ctx.lineTo(cw-40, ch-40-cornRad); ctx.arcTo(cw-40, ch-40, cw-40-cornRad, ch-40, cornRad);
    ctx.lineTo(40+cornRad, ch-40); ctx.arcTo(40, ch-40, 40, ch-40-cornRad, cornRad);
    ctx.lineTo(40, 40+cornRad); ctx.arcTo(40, 40, 40+cornRad, 40, cornRad);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cw/2, 40); ctx.lineTo(cw/2, ch-40); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.fillRect(0, ch/2-140, 45, 280); ctx.fillRect(cw-45, ch/2-140, 45, 280);

    ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.985; ball.vy *= 0.985;

    let cx, cy;
    if (ball.x < 40 + cornRad && ball.y < 40 + cornRad) { cx = 40+cornRad; cy = 40+cornRad; }
    else if (ball.x > cw-40-cornRad && ball.y < 40 + cornRad) { cx = cw-40-cornRad; cy = 40+cornRad; }
    else if (ball.x < 40 + cornRad && ball.y > ch-40-cornRad) { cx = 40+cornRad; cy = ch-40-cornRad; }
    else if (ball.x > cw-40-cornRad && ball.y > ch-40-cornRad) { cx = cw-40-cornRad; cy = ch-40-cornRad; }

    if (cx) {
        let dist = Math.hypot(ball.x - cx, ball.y - cy);
        if (dist > cornRad - ball.r) {
            let ang = Math.atan2(ball.y - cy, ball.x - cx);
            ball.x = cx + Math.cos(ang) * (cornRad - ball.r);
            ball.y = cy + Math.sin(ang) * (cornRad - ball.r);
            ball.vx *= -0.8; ball.vy *= -0.8;
        }
    }

    if(ball.y < 40+ball.r || ball.y > ch-40-ball.r) { ball.vy *= -0.9; ball.y = Math.max(40+ball.r, Math.min(ch-40-ball.r, ball.y)); }
    if(ball.x < 40+ball.r || ball.x > cw-40-ball.r) {
        if(ball.y > ch/2-140 && ball.y < ch/2+140) {
            if(ball.x<0 || ball.x>cw) { let team = ball.x<cw/2?2:1; score[team-1]++; updateSc(); resetRound(); }
        } else { ball.vx *= -0.9; ball.x = Math.max(40+ball.r, Math.min(cw-40-ball.r, ball.x)); }
    }

    pList.forEach(p => {
        if(!p.isMe) {
            if(p.delay > 0) { p.delay--; } else {
                let tx = ball.x, ty = ball.y;
                if(p.role === 'goalkeeper') {
                    tx = (p.t === 2) ? cw - 150 : 150;
                    ty = Math.max(ch/2 - 110, Math.min(ch/2 + 110, ball.y));
                    if (Math.abs(ball.x - p.x) < 200) tx = ball.x;
                }
                let dx = tx-p.x, dy = ty-p.y, d = Math.hypot(dx,dy);
                if(d > 5) { p.x += (dx/d)*p.p; p.y += (dy/d)*p.p; }
                // Вероятность ошибки
                if(Math.random() < 0.02) p.delay = 10;
            }
            p.x = Math.max(p.t==2?cw/2+p.r:p.r+45, Math.min(p.t==2?cw-p.r-45:cw/2-p.r, p.x));
            p.y = Math.max(p.r+45, Math.min(ch-p.r-45, p.y));
        }
        let dP = Math.hypot(ball.x-p.x, ball.y-p.y);
        if(dP < p.r+ball.r) {
            let ang = Math.atan2(ball.y-p.y, ball.x-p.x);
            let force = Math.max(12, p.p * 1.6);
            ball.vx = Math.cos(ang)*force; ball.vy = Math.sin(ang)*force;
            ball.x = p.x + Math.cos(ang)*(p.r+ball.r + 2);
            ball.y = p.y + Math.sin(ang)*(p.r+ball.r + 2);
        }
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.t==1?'#0066ff':'#ff3333'; ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.stroke();
        ctx.font = (p.r)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.e, p.x, p.y);
    });
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(loop);
}

function updateSc() { document.getElementById('sc1').innerText=score[0]; document.getElementById('sc2').innerText=score[1]; }
function resetRound() {
    if(score[0]>=5 || score[1]>=5) { 
        inGame=false; let win = score[0]>=5; 
        let cRew = win ? Math.floor(Math.random()*16)+5 : 0;
        let cpRew = win ? 15 : -10;
        let oldCups = uData.cups;
        db.ref('accounts/'+curUser).update({ cups: Math.max(0, oldCups + cpRew), coins: uData.coins + cRew }).then(() => {
             alert(win ? `ПОБЕДА!\n+${cpRew} 🏆  +${cRew} 💰` : `ПОРАЖЕНИЕ!\n${cpRew} 🏆`);
             renderLobby();
        });
        return; 
    }
    ball={x:cw/2, y:ch/2, vx:0, vy:0, r:28};
    pList.forEach(p => { p.x=p.t==1?200:1080; p.y=p.id>2?(p.t==1?150:570):ch/2; p.delay=0; });
}
function exitGame() { inGame = false; renderLobby(); }
function renderLB() {
    let list = document.getElementById('lb-list'); list.innerHTML = 'Загрузка...';
    db.ref('accounts').once('value', s => {
        let items = []; s.forEach(c => { let v=c.val(); v.id=c.key; items.push(v); });
        items.sort((a,b) => (b.cups||0)-(a.cups||0));
        list.innerHTML = '';
        items.slice(0, 15).forEach((d, i) => {
            list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:rgba(255,255,255,0.1); margin-bottom:5px; border-radius:8px; border:1px solid ${d.id===curUser?'#f5d300':'transparent'}">
                <span style="font-size:12px;">#${i+1} ${d.av} ${d.nick} <small style="color:#777">(${d.id})</small></span> <b>🏆 ${d.cups||0}</b>
            </div>`;
        });
    });
}
</script>
</body>
</html>
