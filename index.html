<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hockey Stars Ultra Fix</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; color: #fff; overflow: hidden; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: center; }

/* Фикс экрана: контейнер теперь не уходит под границы */
#game-container { 
    position: relative; 
    width: 100dvw; 
    height: 100dvh; 
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    background: #0b1c3c; 
    padding-bottom: env(safe-area-inset-bottom, 20px); /* Отступ от низа для айфонов */
}

canvas { 
    max-width: 95%; 
    max-height: 85dvh; /* Поднимаем поле выше, чтобы низ не резало */
    aspect-ratio: 16 / 9; 
    background: #2e86de; 
    border: 3px solid #fff;
    border-radius: 10px;
    display: block;
}

.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 20px; }
.active { display: flex; }

.btn { background: #f5d300; color: #000; border: 4px solid #000; border-radius: 12px; padding: 12px 24px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #000; text-transform: uppercase; margin: 5px; }
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }

.input-field { padding: 12px; font-size: 18px; border: 3px solid #000; border-radius: 10px; width: 280px; margin-bottom: 15px; text-align: center; }

.top-bar { position: absolute; top: 15px; width: 90%; display: flex; justify-content: space-between; z-index: 20; }
.stat-box { background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 12px; border: 2px solid #fff; display: flex; align-items: center; gap: 10px; }

.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
.emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }
.emoji-btn { font-size: 32px; padding: 5px; cursor: pointer; border: 3px solid transparent; border-radius: 10px; }
.emoji-btn.sel { border-color: #f5d300; background: rgba(245,211,0,0.2); }

#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
.score-board { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 3px solid #fff; padding: 5px 30px; border-radius: 15px; font-size: 24px; pointer-events: auto; }

#rotate-hint { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050c1a; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
@media (orientation: portrait) { #rotate-hint { display: flex; } }
</style>
</head>
<body>

<div id="rotate-hint">
    <div style="font-size: 80px;">🏒</div>
    <h2>ПОВЕРНИ ТЕЛЕФОН</h2>
</div>

<div id="game-container">
    <div id="scr-auth" class="screen">
        <h2 style="color:#f5d300; margin-bottom:15px;">НОВЫЙ ИГРОК</h2>
        <input type="text" id="reg-nick" class="input-field" placeholder="Придумай ник">
        <div class="emoji-grid" id="reg-emoji-grid"></div>
        <div class="btn" onclick="applyProfile(true)">СОЗДАТЬ</div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="top-bar">
            <div class="stat-box" onclick="openProfileEdit()" style="cursor:pointer">
                <span id="lb-av" style="font-size:24px;"></span>
                <span id="lb-nick"></span> ⚙️
            </div>
            <div class="stat-box" style="color:#ff9000">🏆 <span id="lb-cups">0</span></div>
        </div>
        
        <div style="display:flex; flex-direction:column; align-items:center; margin-top: 30px;">
            <div style="display:flex; align-items:center; gap:25px; margin-bottom:20px;">
                <div class="btn" onclick="changeChar(-1)">◄</div>
                <div style="text-align:center; background:rgba(255,255,255,0.1); padding:20px; border-radius:20px; border:3px solid #fff; min-width:160px;">
                    <div id="ch-img" style="font-size:70px;"></div>
                    <div id="ch-name" style="font-size:18px; color:#f5d300; margin-top:5px;"></div>
                </div>
                <div class="btn" onclick="changeChar(1)">►</div>
            </div>
            
            <div style="display:flex; gap:15px;">
                <div class="btn btn-blue" onclick="startMode(1)">1 VS 1</div>
                <div class="btn btn-red" onclick="startMode(2)">2 VS 2</div>
            </div>
            <div class="btn" style="width:260px; margin-top:10px;" onclick="switchScr('scr-lb')">ТОП ИГРОКОВ</div>
        </div>
    </div>

    <div id="scr-game" class="screen" style="padding:0;">
        <canvas id="cvs"></canvas>
        <div id="game-ui">
            <div class="score-board">
                <span id="sc1" style="color:#0084ff">0</span> : <span id="sc2" style="color:#ff4747">0</span>
            </div>
            <div class="btn btn-red" style="position:absolute; bottom:30px; right:30px; font-size:14px; pointer-events:auto;" onclick="exitGame()">ВЫЙТИ</div>
        </div>
    </div>

    <div id="scr-lb" class="screen">
        <h2 style="color:#f5d300; margin-bottom:15px;">ГЛОБАЛЬНЫЙ ТОП</h2>
        <div id="lb-list" style="width:90%; flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:15px; padding:15px;"></div>
        <div class="btn btn-red" style="margin-top:15px;" onclick="switchScr('scr-lobby')">НАЗАД</div>
    </div>

    <div id="mod-edit" class="overlay">
        <h3>НАСТРОЙКИ ПРОФИЛЯ</h3>
        <input type="text" id="edit-nick" class="input-field">
        <div class="emoji-grid" id="edit-emoji-grid"></div>
        <div style="display:flex; gap:15px;">
            <div class="btn btn-blue" onclick="applyProfile(false)">СОХРАНИТЬ</div>
            <div class="btn btn-red" onclick="closeProfileEdit()">ОТМЕНА</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    storageBucket: "threecats-hockey.firebasestorage.app",
    messagingSenderId: "859200036415",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const CHARS = [
    {n:'Пуп', e:'💩', s:42, p:7.5}, {n:'Ям', e:'😋', s:55, p:5.5},
    {n:'Лайт', e:'⚡', s:38, p:10.5}, {n:'Гэст', e:'👻', s:45, p:8.5},
    {n:'Файер', e:'🔥', s:50, p:6.5}, {n:'Замб', e:'🧟', s:65, p:3.5}
];
const EMOJIS = ['😺','😎','👽','🤖','👻','💀','🤡','💩','🐵','🦊','🐯','🐸','🐗','🐙','🍔','🍕','🎮','🏆','🔥','💎'];

let user, uData = null, selIdx = 0, tempAv = '😺';
let inGame = false, mode = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1280, ch = 720, dragId = null;

function switchScr(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'scr-lb') renderLB();
}

auth.onAuthStateChanged(async u => {
    user = u || (await auth.signInAnonymously()).user;
    db.ref('users/'+user.uid).on('value', s => {
        if(s.exists()) { uData = s.val(); renderLobby(); }
        else { initEmojiGrids(); switchScr('scr-auth'); }
    });
});

function initEmojiGrids() {
    ['reg-emoji-grid', 'edit-emoji-grid'].forEach(id => {
        let g = document.getElementById(id); if(!g) return;
        g.innerHTML = '';
        EMOJIS.forEach(e => {
            let b = document.createElement('div'); b.className = 'emoji-btn' + (e===tempAv?' sel':'');
            b.innerText = e; b.onclick = () => { tempAv=e; initEmojiGrids(); }; g.appendChild(b);
        });
    });
}

function applyProfile(isNew) {
    let inputId = isNew ? 'reg-nick' : 'edit-nick';
    let nick = document.getElementById(inputId).value.trim();
    if(!nick) { alert("Введи ник!"); return; }
    
    let updates = { nick: nick, av: tempAv };
    if(isNew) { updates.cups = 0; updates.wins = 0; }
    
    db.ref('users/'+user.uid).update(updates).then(() => {
        if(!isNew) closeProfileEdit();
    });
}

function openProfileEdit() {
    tempAv = uData.av;
    document.getElementById('edit-nick').value = uData.nick;
    initEmojiGrids();
    document.getElementById('mod-edit').style.display = 'flex';
}
function closeProfileEdit() { document.getElementById('mod-edit').style.display = 'none'; }

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    document.getElementById('lb-cups').innerText = uData.cups || 0;
    updateCharUI();
}

function updateCharUI() {
    document.getElementById('ch-img').innerText = CHARS[selIdx].e;
    document.getElementById('ch-name').innerText = CHARS[selIdx].n;
}
function changeChar(d) { selIdx = (selIdx + d + CHARS.length) % CHARS.length; updateCharUI(); }

// Логика игры (основная физика и управление)
function getPos(e) {
    let r = cvs.getBoundingClientRect();
    let t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (cw / r.width), y: (t.clientY - r.top) * (ch / r.height) };
}

cvs.addEventListener('touchstart', e => {
    if(!inGame) return;
    let p = getPos(e);
    let me = pList.find(pl => pl.isMe);
    if(me && Math.hypot(me.x - p.x, me.y - p.y) < me.r * 2.5) dragId = me.id;
});
cvs.addEventListener('touchmove', e => {
    if(!dragId || !inGame) return;
    e.preventDefault();
    let p = getPos(e);
    let me = pList.find(pl => pl.id === dragId);
    if(me) {
        me.x = p.x; me.y = p.y;
        me.x = Math.max(me.r + 40, Math.min(cw/2 - 10, me.x));
        me.y = Math.max(me.r + 40, Math.min(ch - me.r - 40, me.y));
    }
}, {passive:false});
window.addEventListener('touchend', () => dragId = null);

function startMode(m) { mode = m; initGame(); }

function initGame() {
    switchScr('scr-game');
    document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch;
    score = [0,0]; inGame = true; updateSc();
    let c = CHARS[selIdx];
    pList = [{ id:1, x:200, y:ch/2, r:c.s, p:c.p, e:c.e, t:1, isMe:true, stuck:0 }];
    pList.push({ id:2, x:1080, y:ch/2, r:45, p:7.5, e:CHARS[Math.floor(Math.random()*CHARS.length)].e, t:2, isMe:false, stuck:0 });
    if(mode === 2) {
        pList.push({ id:3, x:200, y:150, r:40, p:7, e:'🦁', t:1, isMe:false, stuck:0 });
        pList.push({ id:4, x:1080, y:570, r:40, p:7, e:'🐯', t:2, isMe:false, stuck:0 });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:30 };
    requestAnimationFrame(loop);
}

function loop() {
    if(!inGame) return;
    ctx.fillStyle = '#2e86de'; ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 10;
    ctx.strokeRect(40,40,cw-80,ch-80);
    ctx.beginPath(); ctx.moveTo(cw/2,40); ctx.lineTo(cw/2,ch-40); ctx.stroke();
    ctx.beginPath(); ctx.arc(cw/2,ch/2,120,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.fillRect(0,ch/2-140,40,280); ctx.fillRect(cw-40,ch/2-140,40,280);

    ball.x+=ball.vx; ball.y+=ball.vy; ball.vx*=0.985; ball.vy*=0.985;
    if(ball.y < 40+ball.r || ball.y > ch-40-ball.r) { ball.vy*=-1; ball.y=Math.max(40+ball.r, Math.min(ch-40-ball.r, ball.y)); }
    if(ball.x < 40+ball.r || ball.x > cw-40-ball.r) {
        if(ball.y > ch/2-140 && ball.y < ch/2+140) {
            if(ball.x<0 || ball.x>cw) { let team = ball.x<cw/2?2:1; score[team-1]++; updateSc(); resetRound(); }
        } else { ball.vx*=-1; ball.x=Math.max(40+ball.r, Math.min(cw-40-ball.r, ball.x)); }
    }

    pList.forEach(p => {
        if(!p.isMe) {
            let tx=ball.x, ty=ball.y;
            let dBall = Math.hypot(p.x-ball.x, p.y-ball.y);
            if(dBall < p.r+ball.r+10) p.stuck++; else p.stuck=0;
            if(p.stuck>50) { tx=p.t==1?100:cw-100; ty=ch/2; if(p.stuck>80) p.stuck=0; }
            else {
                if(p.t==2 && ball.x<cw/2) { tx=cw*0.8; ty=ch/2; }
                if(p.t==1 && ball.x>cw/2) { tx=cw*0.2; ty=ch/2; }
            }
            let dx=tx-p.x, dy=ty-p.y, d=Math.hypot(dx,dy);
            if(d>5) { p.x+=(dx/d)*p.p; p.y+=(dy/d)*p.p; }
            p.x = Math.max(p.t==2?cw/2+p.r:p.r+40, Math.min(p.t==2?cw-p.r-40:cw/2-p.r, p.x));
            p.y = Math.max(p.r+40, Math.min(ch-p.r-40, p.y));
        }
        let dP = Math.hypot(ball.x-p.x, ball.y-p.y);
        if(dP < p.r+ball.r) {
            let ang = Math.atan2(ball.y-p.y, ball.x-p.x);
            ball.vx = Math.cos(ang)*16; ball.vy = Math.sin(ang)*16;
            ball.x = p.x + Math.cos(ang)*(p.r+ball.r+2);
            ball.y = p.y + Math.sin(ang)*(p.r+ball.r+2);
        }
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.t==1?'#0066ff':'#ff3333'; ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.stroke();
        ctx.font = (p.r)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.e, p.x, p.y);
    });
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
    requestAnimationFrame(loop);
}

function updateSc() { document.getElementById('sc1').innerText=score[0]; document.getElementById('sc2').innerText=score[1]; }

function resetRound() {
    if(score[0]>=5 || score[1]>=5) { 
        inGame=false; 
        let win = score[0]>=5; 
        let rew = win ? 15 : -10;
        db.ref('users/'+user.uid).update({cups: Math.max(0, (uData.cups||0)+rew)});
        alert(win ? 'ПОБЕДА! +15🏆' : 'ПРОИГРЫШ! -10🏆');
        renderLobby(); 
        return; 
    }
    ball={x:cw/2, y:ch/2, vx:0, vy:0, r:30};
    pList.forEach(p => { p.x=p.t==1?200:1080; p.y=p.id>2?(p.t==1?150:570):ch/2; p.stuck=0; });
}

function exitGame() { inGame = false; renderLobby(); }

// Исправленный рендер топа игроков
function renderLB() {
    let list = document.getElementById('lb-list');
    list.innerHTML = '<div style="text-align:center;">Загрузка...</div>';
    
    db.ref('users').once('value').then(s => {
        let items = [];
        s.forEach(child => {
            let val = child.val();
            if(val && val.nick) items.push(val);
        });
        
        // Сортировка по кубкам
        items.sort((a,b) => (b.cups || 0) - (a.cups || 0));
        
        list.innerHTML = '';
        if(items.length === 0) {
            list.innerHTML = '<div style="text-align:center;">Пока никого нет...</div>';
            return;
        }

        items.slice(0, 20).forEach((d, i) => {
            let isMe = d.nick === uData.nick;
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:${isMe ? 'rgba(245,211,0,0.2)' : 'rgba(255,255,255,0.1)'}; margin-bottom:8px; border-radius:10px; border: 2px solid ${isMe ? '#f5d300' : 'transparent'}">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="color:#f5d300; font-size:14px;">#${i+1}</span>
                        <span style="font-size:24px;">${d.av || '👤'}</span>
                        <span style="font-size:16px;">${d.nick}</span>
                    </div>
                    <b style="color:#ff9000">🏆 ${d.cups || 0}</b>
                </div>`;
        });
    }).catch(err => {
        list.innerHTML = '<div style="color:red;">Ошибка доступа к базе</div>';
    });
}
</script>
</body>
</html>
