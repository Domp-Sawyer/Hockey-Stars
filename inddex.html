<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Hockey Stars Ultimate</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
* { box-sizing: border-box; font-family: 'Arial Black', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #050c1a; color: #fff; overflow: hidden; position: fixed; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
#game-container { position: relative; width: 100%; height: 100%; max-width: 100vh; aspect-ratio: 16 / 9; background: #0b1c3c; overflow: hidden; border: 2px solid #333; }
.screen { position: absolute; width: 100%; height: 100%; display: none; background: radial-gradient(circle, #1a3a7a, #0b1c3c); flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
.active { display: flex; }
.btn { background: #f5d300; color: #000; border: 4px solid #000; border-radius: 8px; padding: 10px 20px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #000; text-transform: uppercase; margin: 5px; transition: 0.1s; }
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
.btn-red { background: #ff4747; color: #fff; }
.btn-blue { background: #0084ff; color: #fff; }
.input-field { padding: 10px; font-size: 16px; border: 3px solid #000; border-radius: 8px; width: 80%; margin-bottom: 10px; text-align: center; }
.top-bar { position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; z-index: 20; }
.stat-box { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 10px; border: 2px solid #fff; display: flex; align-items: center; gap: 8px; font-size: 14px; }
.lobby-ui { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 40px; }
.char-preview { display: flex; align-items: center; gap: 20px; }
.char-card { text-align: center; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; border: 2px solid #fff; min-width: 140px; }
.char-img { font-size: 60px; margin: 10px 0; }
canvas { width: 100%; height: 100%; display: block; background: #2e86de; }
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }
.score-board { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); background: #000; border: 2px solid #fff; padding: 5px 25px; border-radius: 10px; font-size: 24px; pointer-events: auto; }
.overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:500; display:none; flex-direction:column; align-items:center; justify-content:center; }
.emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px; }
.emoji-btn { font-size: 24px; padding: 5px; cursor: pointer; border: 2px solid transparent; border-radius: 5px; }
.emoji-btn.sel { border-color: #00ff00; background: rgba(0,255,0,0.2); }
</style>
</head>
<body>

<div id="game-container">
    <div id="scr-auth" class="screen">
        <h2 style="color:#f5d300">РЕГИСТРАЦИЯ</h2>
        <input type="text" id="reg-nick" class="input-field" placeholder="Никнейм">
        <div class="emoji-grid" id="reg-emoji-grid"></div>
        <div class="btn" onclick="saveProfile(true)">НАЧАТЬ</div>
    </div>

    <div id="scr-lobby" class="screen">
        <div class="top-bar">
            <div class="stat-box" onclick="showProfileEdit()" style="cursor:pointer">
                <span id="lb-av"></span> <span id="lb-nick"></span> ⚙️
            </div>
            <div class="stat-box" style="color:#ff9000">🏆 <span id="lb-cups">0</span></div>
        </div>
        <div class="lobby-ui">
            <div class="char-preview">
                <div class="btn" onclick="changeChar(-1)">◄</div>
                <div class="char-card">
                    <div id="ch-img" class="char-img"></div>
                    <h4 id="ch-name"></h4>
                </div>
                <div class="btn" onclick="changeChar(1)">►</div>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="btn btn-blue" onclick="startMode(1)">1 VS 1</div>
                <div class="btn btn-red" onclick="startMode(2)">2 VS 2</div>
            </div>
            <div class="btn" style="width:200px" onclick="toggleRooms()">КОМНАТЫ</div>
            <div class="btn btn-blue" style="font-size:12px" onclick="showLB()">ЛИДЕРЫ</div>
        </div>
    </div>

    <div id="scr-rooms" class="screen">
        <h2>ИГРА С ДРУГОМ</h2>
        <input type="text" id="room-code" class="input-field" placeholder="Код комнаты">
        <div style="display:flex; gap:10px;">
            <div class="btn btn-blue" onclick="createRoom()">СОЗДАТЬ</div>
            <div class="btn" onclick="joinRoom()">ЗАЙТИ</div>
        </div>
        <div class="btn btn-red" onclick="switchScr('scr-lobby')">ОТМЕНА</div>
    </div>

    <div id="scr-game" class="screen" style="padding:0; background:#2e86de;">
        <canvas id="cvs"></canvas>
        <div id="game-ui">
            <div class="score-board">
                <span id="sc1" style="color:#0084ff">0</span> : <span id="sc2" style="color:#ff4747">0</span>
            </div>
            <div class="btn btn-red" style="position:absolute; bottom:10px; right:10px; font-size:12px; pointer-events:auto;" onclick="exitGame()">ВЫЙТИ</div>
        </div>
    </div>

    <div id="scr-lb" class="screen">
        <h2 style="color:#f5d300">ТОП ИГРОКОВ</h2>
        <div id="lb-container" style="width:90%; flex:1; overflow-y:auto; margin:10px 0;"></div>
        <div class="btn btn-red" onclick="switchScr('scr-lobby')">НАЗАД</div>
    </div>

    <div id="mod-profile" class="overlay">
        <div style="background:#0b1c3c; padding:20px; border-radius:15px; border:3px solid #fff; text-align:center;">
            <h3>ИЗМЕНИТЬ ПРОФИЛЬ</h3>
            <input type="text" id="edit-nick" class="input-field">
            <div class="emoji-grid" id="edit-emoji-grid"></div>
            <div class="btn btn-blue" onclick="saveProfile(false)">СОХРАНИТЬ</div>
            <div class="btn btn-red" onclick="document.getElementById('mod-profile').style.display='none'">ОТМЕНА</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCWznT2BrzSlsiB83VhNUEje1om8ktsG3s",
    authDomain: "threecats-hockey.firebaseapp.com",
    databaseURL: "https://threecats-hockey-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "threecats-hockey",
    storageBucket: "threecats-hockey.firebasestorage.app",
    messagingSenderId: "859200036415",
    appId: "1:859200036415:web:eac0eaa951fc642d75a28a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const CHARS = [
    {id:'c1', n:'Пуп', e:'💩', s:40, p:7}, {id:'c2', n:'Ям', e:'😋', s:50, p:5},
    {id:'c3', n:'Лайт', e:'⚡', s:35, p:10}, {id:'c4', n:'Гэст', e:'👻', s:45, p:8},
    {id:'c5', n:'Файер', e:'🔥', s:48, p:6}, {id:'c6', n:'Базз', e:'🐝', s:30, p:9},
    {id:'c7', n:'Пикз', e:'👾', s:55, p:4}, {id:'c8', n:'Скул', e:'💀', s:42, p:7},
    {id:'c9', n:'Клайни', e:'🤡', s:45, p:7}, {id:'c10', n:'Замб', e:'🧟', s:60, p:3}
];
const EMOJIS = ['😺','😎','👽','🤖','👻','💀','🤡','💩','🐵','🦊','🐯','🐸'];

let user, uData = null, selIdx = 0, selAv = '😺';
let inGame = false, mode = 1, score = [0,0], pList = [], ball = {};
let cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d');
let cw = 1280, ch = 720, dragId = null;

function switchScr(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

auth.onAuthStateChanged(async u => {
    user = u || (await auth.signInAnonymously()).user;
    db.ref('users/'+user.uid).once('value', s => {
        if(s.exists()) { uData = s.val(); renderLobby(); }
        else { initEmojiGrids(); switchScr('scr-auth'); }
    });
});

function initEmojiGrids() {
    ['reg-emoji-grid', 'edit-emoji-grid'].forEach(id => {
        let g = document.getElementById(id); g.innerHTML = '';
        EMOJIS.forEach(e => {
            let b = document.createElement('div'); b.className = 'emoji-btn' + (e===selAv?' sel':'');
            b.innerText = e; b.onclick = () => { selAv=e; initEmojiGrids(); }; g.appendChild(b);
        });
    });
}

function saveProfile(isNew) {
    let nick = document.getElementById(isNew ? 'reg-nick' : 'edit-nick').value.trim();
    if(!nick) return;
    if(isNew) {
        uData = { nick, av:selAv, cups:0, wins:0 };
    } else {
        uData.nick = nick; uData.av = selAv;
        document.getElementById('mod-profile').style.display = 'none';
    }
    db.ref('users/'+user.uid).set(uData).then(renderLobby);
}

function showProfileEdit() {
    document.getElementById('edit-nick').value = uData.nick;
    selAv = uData.av; initEmojiGrids();
    document.getElementById('mod-profile').style.display = 'flex';
}

function renderLobby() {
    switchScr('scr-lobby');
    document.getElementById('lb-av').innerText = uData.av;
    document.getElementById('lb-nick').innerText = uData.nick;
    document.getElementById('lb-cups').innerText = uData.cups || 0;
    updateCharUI();
}

function updateCharUI() {
    let c = CHARS[selIdx];
    document.getElementById('ch-img').innerText = c.e;
    document.getElementById('ch-name').innerText = c.n;
}
function changeChar(d) { selIdx = (selIdx + d + CHARS.length) % CHARS.length; updateCharUI(); }

function getPos(e) {
    let r = cvs.getBoundingClientRect();
    let t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left) * (cw / r.width), y: (t.clientY - r.top) * (ch / r.height) };
}

cvs.addEventListener('touchstart', e => {
    if(!inGame) return;
    let p = getPos(e);
    let me = pList.find(pl => pl.isMe);
    if(me && Math.hypot(me.x - p.x, me.y - p.y) < me.r * 2) dragId = me.id;
});
cvs.addEventListener('touchmove', e => {
    if(!dragId || !inGame) return;
    e.preventDefault();
    let p = getPos(e);
    let me = pList.find(pl => pl.id === dragId);
    if(me) {
        me.x = p.x; me.y = p.y;
        me.x = Math.max(me.r + 30, Math.min(cw/2 - 10, me.x));
        me.y = Math.max(me.r + 30, Math.min(ch - me.r - 30, me.y));
    }
}, {passive:false});
window.addEventListener('touchend', () => dragId = null);

function startMode(m) {
    mode = m; initGame();
}

function initGame() {
    switchScr('scr-game');
    document.getElementById('game-ui').style.display = 'block';
    cvs.width = cw; cvs.height = ch;
    score = [0,0]; updateSc(); inGame = true;
    
    let myC = CHARS[selIdx];
    pList = [{ id:1, x:250, y:ch/2, r:myC.s, p:myC.p, e:myC.e, t:1, isMe:true }];
    pList.push({ id:2, x:1030, y:ch/2, r:45, p:7, e:CHARS[Math.floor(Math.random()*CHARS.length)].e, t:2, isMe:false });
    
    if(mode === 2) {
        pList.push({ id:3, x:250, y:150, r:40, p:7, e:'🦁', t:1, isMe:false });
        pList.push({ id:4, x:1030, y:570, r:40, p:7, e:'🐯', t:2, isMe:false });
    }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:28 };
    gameLoop();
}

function gameLoop() {
    if(!inGame) return;
    ctx.fillStyle = '#2e86de'; ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 10;
    ctx.strokeRect(30, 30, cw-60, ch-60);
    ctx.beginPath(); ctx.moveTo(cw/2, 30); ctx.lineTo(cw/2, ch-30); ctx.stroke();
    ctx.beginPath(); ctx.arc(cw/2, ch/2, 120, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.fillRect(0, ch/2-140, 40, 280); ctx.fillRect(cw-40, ch/2-140, 40, 280);

    ball.x += ball.vx; ball.y += ball.vy; ball.vx *= 0.98; ball.vy *= 0.98;
    if(ball.y < 60 || ball.y > ch-60) ball.vy *= -1;
    if(ball.x < 60 || ball.x > cw-60) {
        if(ball.y > ch/2-140 && ball.y < ch/2+140) {
            let team = ball.x < cw/2 ? 2 : 1; score[team-1]++; updateSc(); resetRound();
        } else { ball.vx *= -1; }
    }

    pList.forEach(p => {
        if(!p.isMe) {
            let targetX = ball.x, targetY = ball.y;
            if(p.t === 2 && ball.x < cw/2) { targetX = cw*0.8; targetY = ch/2; }
            if(p.t === 1 && ball.x > cw/2) { targetX = cw*0.2; targetY = ch/2; }
            let dx = targetX - p.x, dy = targetY - p.y, dist = Math.hypot(dx, dy);
            if(dist > 5) { p.x += (dx/dist)*p.p; p.y += (dy/dist)*p.p; }
            if(p.t === 2) p.x = Math.max(cw/2 + p.r, Math.min(cw - p.r - 40, p.x));
            else p.x = Math.max(p.r + 40, Math.min(cw/2 - p.r, p.x));
            p.y = Math.max(p.r + 40, Math.min(ch - p.r - 40, p.y));
        }
        let dP = Math.hypot(ball.x - p.x, ball.y - p.y);
        if(dP < p.r + ball.r) {
            let ang = Math.atan2(ball.y - p.y, ball.x - p.x);
            ball.vx = Math.cos(ang) * 16; ball.vy = Math.sin(ang) * 16;
        }
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.t === 1 ? '#0066ff' : '#ff3333'; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.stroke();
        ctx.font = (p.r*1.2)+"px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(p.e, p.x, p.y);
    });

    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    requestAnimationFrame(gameLoop);
}

function updateSc() { document.getElementById('sc1').innerText = score[0]; document.getElementById('sc2').innerText = score[1]; }
function resetRound() {
    if(score[0] >= 5 || score[1] >= 5) { finishGame(score[0] >= 5); return; }
    ball = { x:cw/2, y:ch/2, vx:0, vy:0, r:28 };
    pList.forEach(p => { p.x = p.t === 1 ? 250 : 1030; p.y = p.id > 2 ? (p.t===1?150:570) : ch/2; });
}

function finishGame(win) {
    inGame = false;
    let reward = win ? 15 : -10;
    uData.cups = Math.max(0, (uData.cups || 0) + reward);
    if(win) uData.wins = (uData.wins || 0) + 1;
    db.ref('users/'+user.uid).update(uData);
    alert(win ? "ПОБЕДА! +15🏆" : "ПРОИГРЫШ! -10🏆");
    renderLobby();
}

function exitGame() { inGame = false; renderLobby(); }

function showLB() {
    switchScr('scr-lb');
    let cont = document.getElementById('lb-container'); cont.innerHTML = 'Загрузка...';
    db.ref('users').orderByChild('cups').limitToLast(15).once('value', s => {
        cont.innerHTML = ''; let items = [];
        s.forEach(child => items.push(child.val()));
        items.reverse().forEach((d, i) => {
            cont.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.1); margin-bottom:5px; border-radius:8px;">
                <span>#${i+1} ${d.av} ${d.nick}</span> <b>🏆 ${d.cups || 0}</b>
            </div>`;
        });
    });
}

function toggleRooms() { switchScr('scr-rooms'); }
function createRoom() {
    let code = Math.floor(1000 + Math.random()*9000);
    document.getElementById('room-code').value = code;
    alert("Комната создана! Код: " + code);
}
function joinRoom() {
    if(document.getElementById('room-code').value) startMode(1);
}
</script>
</body>
</html>
